<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surveyor Availability — THAC Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/thac.css">
  <style>
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    select, button {
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      background: white;
    }
    button {
      background: #1a3c2e;
      color: white;
      border: none;
    }
    button:hover { opacity: 0.9; }
    .calendar-wrapper {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: var(--shadow-sm);
      overflow-x: auto;
    }
    .month-header {
      font-size: 16px;
      font-weight: 700;
      color: #1a3c2e;
      margin-bottom: 16px;
      text-align: center;
    }
    .calendar {
      display: grid;
      grid-template-columns: 150px repeat(31, 30px);
      gap: 1px;
      background: #e5e7eb;
      padding: 1px;
    }
    .surveyor-name {
      background: #f9fafb;
      padding: 10px;
      font-weight: 600;
      font-size: 13px;
      color: #1a3c2e;
      border-right: 2px solid #d1d5db;
    }
    .day-header {
      background: #f3f4f6;
      padding: 8px;
      text-align: center;
      font-weight: 600;
      font-size: 12px;
      color: #6b7280;
    }
    .day-cell {
      background: #fff;
      padding: 4px;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }
    .day-off {
      background: #fee2e2;
      border: 1px solid #fca5a5;
    }
    .day-number {
      font-size: 10px;
      color: #9ca3af;
    }
    .legend {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e5e7eb;
      font-size: 13px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .legend-color {
      width: 20px;
      height: 20px;
      border-radius: 3px;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
  </style>
</head>
<body>
<div class="app-layout" id="app"></div>
<script src="js/supabase.js"></script>
<script src="js/thac.js"></script>
<script>
  requireAuth();
  const today = new Date();

  async function initPage() {
    document.getElementById('app').innerHTML = `
      ${renderSidebar('availability')}
      <div class="main-content">
        <div class="topbar">
          <div class="topbar-title">Surveyor Availability</div>
        </div>
        <div class="page-body">
          <div class="card">
            <div class="card-title">Surveyor Time Off Calendar</div>
            <div class="controls">
              <select id="monthSelect">
                <option value="0">January</option>
                <option value="1">February</option>
                <option value="2">March</option>
                <option value="3">April</option>
                <option value="4">May</option>
                <option value="5">June</option>
                <option value="6">July</option>
                <option value="7">August</option>
                <option value="8">September</option>
                <option value="9">October</option>
                <option value="10">November</option>
                <option value="11">December</option>
              </select>
              <select id="yearSelect"></select>
              <button onclick="loadCalendar()">Load</button>
            </div>
            <div id="error" style="display:none;background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;padding:16px;border-radius:6px;margin-bottom:16px;"></div>
            <div id="loading" class="loading">Loading...</div>
            <div id="content" style="display:none;">
              <div class="calendar-wrapper">
                <div class="month-header" id="monthHeader"></div>
                <div class="calendar" id="calendar"></div>
              </div>
              <div class="legend">
                <div class="legend-item">
                  <div class="legend-color" style="background: #fee2e2;"></div>
                  <span>Time Off</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    `;

    document.getElementById('monthSelect').value = today.getMonth();

    // Populate year select
    for (let y = today.getFullYear() - 1; y <= today.getFullYear() + 2; y++) {
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y;
      if (y === today.getFullYear()) opt.selected = true;
      document.getElementById('yearSelect').appendChild(opt);
    }

    loadCalendar();
  }

  async function loadCalendar() {
    const month = parseInt(document.getElementById('monthSelect').value);
    const year = parseInt(document.getElementById('yearSelect').value);

    document.getElementById('loading').style.display = 'block';
    document.getElementById('content').style.display = 'none';
    document.getElementById('error').style.display = 'none';

    try {
      // Load surveyors
      const surveyors = await dbGet('surveyors', {
        'select': 'id,full_name,is_active',
        'order': 'full_name.asc'
      });

      // Load time off for this month
      const start = new Date(year, month, 1);
      const end = new Date(year, month + 1, 1);
      const startStr = start.toISOString().split('T')[0];
      const endStr = end.toISOString().split('T')[0];

      const timeOff = await dbGet('surveyor_time_off', {
        'select': 'surveyor_id,start_date,end_date'
      });

      if (!surveyors || !Array.isArray(surveyors)) {
        throw new Error('Failed to load surveyors');
      }

      // Build calendar
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const monthName = new Date(year, month).toLocaleString('en-GB', { month: 'long', year: 'numeric' });

      document.getElementById('monthHeader').textContent = monthName;

      const calendar = document.getElementById('calendar');
      calendar.innerHTML = '';

      // Add day headers
      calendar.innerHTML += '<div class="surveyor-name"></div>';
      for (let d = 1; d <= daysInMonth; d++) {
        const cell = document.createElement('div');
        cell.className = 'day-header';
        cell.textContent = d;
        calendar.appendChild(cell);
      }

      // Add surveyor rows
      (surveyors || []).forEach(surveyor => {
        const nameCell = document.createElement('div');
        nameCell.className = 'surveyor-name';
        nameCell.textContent = surveyor.full_name;
        calendar.appendChild(nameCell);

        for (let d = 1; d <= daysInMonth; d++) {
          const dateStr = new Date(year, month, d).toISOString().split('T')[0];
          const cell = document.createElement('div');
          cell.className = 'day-cell';

          const hasTimeOff = (timeOff || []).some(to => {
            const start = new Date(to.start_date);
            const end = new Date(to.end_date);
            const current = new Date(year, month, d);
            return current >= start && current <= end;
          });

          if (hasTimeOff) {
            cell.className += ' day-off';
          }
          cell.innerHTML = `<span class="day-number">${d}</span>`;
          calendar.appendChild(cell);
        }
      });

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    } catch (err) {
      console.error(err);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = err.message || 'Error loading calendar';
    }
  }

  initPage();
</script>
</body>
</html>
