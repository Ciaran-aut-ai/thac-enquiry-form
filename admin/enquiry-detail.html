<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THAC CRM — Enquiry Detail</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/thac.css">
<style>
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.modal {
  background: white; border-radius: 16px; padding: 32px;
  width: 100%; max-width: 560px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.modal-title {
  font-size: 18px; font-weight: 700; color: var(--green-dark);
  margin-bottom: 6px;
}
.modal-sub {
  font-size: 13px; color: var(--text-muted); margin-bottom: 24px;
}
.modal-footer {
  display: flex; gap: 10px; margin-top: 24px;
}
</style>
</head>
<body>
<div class="app-layout" id="app"></div>

<!-- Convert to Job Modal -->
<div class="modal-overlay" id="convertModal" style="display:none">
  <div class="modal">
    <div class="modal-title">Convert to Job</div>
    <div class="modal-sub">Review the details below before creating the job record.</div>

    <div class="form-group">
      <label>Client Full Name <span class="req">*</span></label>
      <input type="text" class="form-control" id="cvtName">
    </div>
    <div class="form-group">
      <label>Client Email <span class="req">*</span></label>
      <input type="email" class="form-control" id="cvtEmail">
    </div>
    <div class="form-group">
      <label>Client Phone</label>
      <input type="tel" class="form-control" id="cvtPhone">
    </div>
    <div class="form-group">
      <label>Company / Organisation</label>
      <input type="text" class="form-control" id="cvtCompany">
    </div>
    <div class="form-group">
      <label>Site Postcode <span class="req">*</span></label>
      <input type="text" class="form-control" id="cvtPostcode" style="text-transform:uppercase">
    </div>
    <div class="form-group">
      <label>Survey Type</label>
      <select class="form-control" id="cvtSurveyType">
        <option value="bs5837">BS5837 Tree Survey (Planning)</option>
        <option value="vta">Visual Tree Assessment (VTA)</option>
        <option value="bc">BS5837 Stage 2 (AIA/AMS/TPP)</option>
        <option value="subs">Subsidence / Building Damage</option>
        <option value="ams">Arboricultural Method Statement</option>
        <option value="tpp">Tree Protection Plan</option>
        <option value="tpo">TPO Application</option>
        <option value="lscp">Landscaping Plans</option>
        <option value="mortgage">Mortgage / Insurer Report</option>
        <option value="supervision">Site Supervision</option>
        <option value="amendment">Amendment</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Urgency State</label>
      <select class="form-control" id="cvtUrgency">
        <option value="red">🔴 Urgent (1 day)</option>
        <option value="orange">🟠 Elevated (3 days)</option>
        <option value="yellow" selected>🟡 Standard (5 days)</option>
        <option value="grey">⚫ Low (10+ days)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Quoted Amount (£ excl VAT)</label>
      <input type="number" class="form-control" id="cvtAmount" placeholder="e.g. 350">
    </div>
    <div class="form-group">
      <label>Billing Mode</label>
      <select class="form-control" id="cvtBilling">
        <option value="single">Single Invoice (default)</option>
        <option value="staged">Staged 50/50</option>
      </select>
    </div>
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:500;">
        <input type="checkbox" id="cvtTwoStage">
        Two-stage BS5837 report
      </label>
      <div style="font-size:12px;color:var(--text-muted);margin-top:4px;padding-left:20px;">
        Tick if Stage 1 survey and Stage 2 report will be completed separately. Automatically sets staged 50/50 billing.
      </div>
    </div>
    <div class="form-group">
      <label>Internal Notes</label>
      <textarea class="form-control" id="cvtNotes" placeholder="Any internal notes for this job..."></textarea>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()" style="flex:1;justify-content:center;">Cancel</button>
      <button class="btn btn-primary" onclick="confirmConvert()" style="flex:2;justify-content:center;" id="cvtBtn">
        ✓ Create Job
      </button>
    </div>
  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/thac.js"></script>
<script>
requireAuth();

const params = new URLSearchParams(window.location.search);
const enquiryId = params.get('id');
let enquiry = null;

if (!enquiryId) window.location.href = 'enquiries.html';

async function init() {
  document.getElementById('app').innerHTML = `
    ${renderSidebar('enquiries')}
    <div class="main-content">
      <div class="topbar">
        <a href="enquiries.html" class="btn btn-secondary btn-sm">← Back</a>
        <div class="topbar-title" id="pageTitle">Enquiry Detail</div>
      </div>
      <div class="page-body" id="pageBody">
        <div class="loading"><div class="spinner"></div><br>Loading enquiry...</div>
      </div>
    </div>
  `;
  await loadEnquiry();
  await loadEnquiryBadge();
}

async function loadEnquiry() {
  try {
    const data = await dbGet('enquiries', { 'id': `eq.${enquiryId}`, 'limit': 1 });
    if (!data || data.length === 0) {
      document.getElementById('pageBody').innerHTML = `<div class="empty-state"><h3>Enquiry not found</h3></div>`;
      return;
    }
    enquiry = data[0];
    document.getElementById('pageTitle').textContent = enquiry.job_number || 'Enquiry Detail';
    renderEnquiry();
  } catch (e) {
    document.getElementById('pageBody').innerHTML = `<div class="empty-state"><p>Error: ${e.message}</p></div>`;
  }
}

function renderEnquiry() {
  const isAmendment = enquiry.enquiry_type === 'amendment';
  const isAccepted = enquiry.status === 'accepted';

  document.getElementById('pageBody').innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-ref">${enquiry.job_number || 'Pending Reference'}</div>
        <div class="detail-sub">
          ${isAmendment ? '📋 Amendment' : '🆕 New Survey'} ·
          Received ${formatDateTime(enquiry.submitted_at)}
        </div>
      </div>
      <div style="margin-left:auto;display:flex;gap:10px;align-items:center;">
        ${urgencyBadge(enquiry.deadline_tier)}
        ${statusBadge(enquiry.status)}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 340px;gap:20px;">
      <div style="display:flex;flex-direction:column;gap:20px;">

        <!-- Contact Details -->
        <div class="card">
          <div class="card-title">Contact Details</div>
          <div class="detail-grid">
            <div class="detail-field">
              <label>Full Name</label>
              <div class="field-value">${enquiry.contact_name || '—'}</div>
            </div>
            <div class="detail-field">
              <label>Company</label>
              <div class="field-value">${enquiry.company || '—'}</div>
            </div>
            <div class="detail-field">
              <label>Email</label>
              <div class="field-value">
                <a href="mailto:${enquiry.contact_email}">${enquiry.contact_email || '—'}</a>
              </div>
            </div>
            <div class="detail-field">
              <label>Phone</label>
              <div class="field-value">
                ${enquiry.contact_phone ? `<a href="tel:${enquiry.contact_phone}">${enquiry.contact_phone}</a>` : '—'}
              </div>
            </div>
          </div>
        </div>

        ${isAmendment ? `
        <div class="card">
          <div class="card-title">Amendment Details</div>
          <div class="detail-grid">
            <div class="detail-field">
              <label>Original Job Reference</label>
              <div class="field-value ref">${enquiry.original_job_ref || '—'}</div>
            </div>
            <div class="detail-field">
              <label>Deadline</label>
              <div class="field-value">${getDeadlineLabel(enquiry.deadline_tier)}</div>
            </div>
          </div>
          <div class="detail-field" style="margin-top:12px;">
            <label>Scope of Amendment</label>
            <div class="field-value" style="background:var(--bg);padding:12px;border-radius:8px;margin-top:6px;line-height:1.6;">
              ${enquiry.amendment_scope || '—'}
            </div>
          </div>
        </div>
        ` : `
        <div class="card">
          <div class="card-title">Survey Details</div>
          <div class="detail-grid">
            <div class="detail-field">
              <label>Survey Type</label>
              <div class="field-value">${getSurveyLabel(enquiry.survey_type)}</div>
            </div>
            <div class="detail-field">
              <label>Tree Count Band</label>
              <div class="field-value">${enquiry.tree_count_band ? enquiry.tree_count_band + ' trees' : '—'}</div>
            </div>
            <div class="detail-field">
              <label>Site Postcode</label>
              <div class="field-value">
                <strong>${enquiry.site_postcode || '—'}</strong>
                ${enquiry.site_postcode ? `<br><a href="https://maps.google.com/?q=${enquiry.site_postcode}" target="_blank" style="font-size:12px;color:var(--green-mid);">View on Google Maps →</a>` : ''}
              </div>
            </div>
            <div class="detail-field">
              <label>Required Deadline</label>
              <div class="field-value">${getDeadlineLabel(enquiry.deadline_tier)}</div>
            </div>
            <div class="detail-field">
              <label>Quoted Price</label>
              <div class="field-value" style="font-size:20px;font-weight:700;color:var(--green-mid);">
                ${enquiry.quoted_price ? '£' + Number(enquiry.quoted_price).toLocaleString() + ' <span style="font-size:13px;font-weight:400;color:var(--text-muted);">excl VAT</span>' : '<span style="font-size:14px;font-weight:400;">Custom quote</span>'}
              </div>
            </div>
          </div>
        </div>
        `}

        <!-- Internal Notes -->
        <div class="card">
          <div class="card-title">
            Internal Notes
            <button class="btn btn-secondary btn-sm" id="enqNoteBtn" onclick="toggleEnqNote()">
              ${enquiry.internal_notes ? 'Edit' : 'Add note'}
            </button>
          </div>
          <div id="enqNoteDisplay">
            ${enquiry.internal_notes
              ? `<div style="font-size:13px;line-height:1.6;background:var(--amber-light);padding:12px;border-radius:8px;">${enquiry.internal_notes}</div>`
              : `<div style="font-size:13px;color:var(--text-muted);">No notes yet — log calls, follow-ups, or quote discussions here.</div>`}
          </div>
          <div id="enqNoteEditor" style="display:none;margin-top:8px;">
            <textarea class="form-control" id="enqNoteText" rows="4"
              placeholder="e.g. Called 30 May — client happy with quote, confirming by Friday...">${enquiry.internal_notes || ''}</textarea>
            <div style="display:flex;gap:8px;margin-top:8px;">
              <button class="btn btn-secondary" onclick="toggleEnqNote()">Cancel</button>
              <button class="btn btn-primary" onclick="saveEnqNote()">Save Note</button>
            </div>
          </div>
        </div>

      </div>

      <!-- Right column -->
      <div style="display:flex;flex-direction:column;gap:20px;">

        <!-- Update Status -->
        <div class="card">
          <div class="card-title">Update Status</div>
          <div class="form-group">
            <label>Current Status</label>
            <select class="form-control" id="statusSelect">
              <option value="new"      ${enquiry.status==='new'      ?'selected':''}>New</option>
              <option value="reviewed" ${enquiry.status==='reviewed' ?'selected':''}>Reviewed</option>
              <option value="quoted"   ${enquiry.status==='quoted'   ?'selected':''}>Quoted</option>
              <option value="accepted" ${enquiry.status==='accepted' ?'selected':''}>Accepted</option>
              <option value="declined" ${enquiry.status==='declined' ?'selected':''}>Declined</option>
              <option value="spam"     ${enquiry.status==='spam'     ?'selected':''}>Spam</option>
            </select>
          </div>
          <button class="btn btn-primary w-100" onclick="updateStatus()" style="justify-content:center;">
            Save Status
          </button>
        </div>

        <!-- Quick Actions -->
        <div class="card">
          <div class="card-title">Quick Actions</div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            ${!isAmendment && enquiry.quoted_price ? `
            <a href="${buildQuoteEmail()}" class="btn btn-primary w-100" style="justify-content:center;background:var(--green-dark);">
              📧 Send Quote Email
            </a>` : ''}
            <a href="mailto:${enquiry.contact_email}?subject=Re: Your Arboricultural Survey Enquiry ${enquiry.job_number || ''}" class="btn btn-secondary w-100" style="justify-content:center;">
              📧 General Email
            </a>
            ${enquiry.contact_phone ? `
            <a href="tel:${enquiry.contact_phone}" class="btn btn-secondary w-100" style="justify-content:center;">
              📞 Call Client
            </a>` : ''}
            ${!isAccepted ? `
            <button class="btn btn-primary w-100" onclick="openConvertModal()" style="justify-content:center;background:var(--green-dark);">
              💼 Convert to Job
            </button>` : `
            <div style="text-align:center;font-size:13px;color:var(--green-mid);font-weight:500;padding:8px;">
              ✅ Converted to Job
            </div>`}
          </div>
        </div>

        <!-- Record Info -->
        <div class="card">
          <div class="card-title">Record Info</div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            <div class="detail-field">
              <label>Reference</label>
              <div class="field-value ref">${enquiry.job_number || 'Pending'}</div>
            </div>
            <div class="detail-field">
              <label>Submitted</label>
              <div class="field-value">${formatDateTime(enquiry.submitted_at)}</div>
            </div>
            <div class="detail-field">
              <label>Type</label>
              <div class="field-value">${enquiry.enquiry_type === 'amendment' ? 'Amendment' : 'New Survey'}</div>
            </div>
            ${enquiry.accepted_at ? `
            <div class="detail-field">
              <label>Accepted</label>
              <div class="field-value" style="color:var(--green-dark);font-weight:600;">
                ✅ ${formatDateTime(enquiry.accepted_at)}
              </div>
            </div>` : ''}
            ${enquiry.declined_at ? `
            <div class="detail-field">
              <label>Declined</label>
              <div class="field-value" style="color:#dc2626;font-weight:600;">
                ❌ ${formatDateTime(enquiry.declined_at)}
              </div>
            </div>` : ''}
            ${enquiry.declined_reason ? `
            <div class="detail-field">
              <label>Decline Reason</label>
              <div class="field-value" style="color:#dc2626;">${enquiry.declined_reason}</div>
            </div>` : ''}
          </div>
        </div>

        ${enquiry.client_details_at ? `
        <!-- Client-submitted details (Step 2) -->
        <div class="card" style="border-left:3px solid var(--green-mid);">
          <div class="card-title">Client-Submitted Details
            <span style="font-size:11px;font-weight:400;color:var(--text-muted);">via acceptance form</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            ${enquiry.end_client_name ? `
            <div class="detail-field">
              <label>End Client</label>
              <div class="field-value">${enquiry.end_client_name}${enquiry.end_client_email ? ` · ${enquiry.end_client_email}` : ''}</div>
            </div>` : ''}
            ${enquiry.billing_contact_name ? `
            <div class="detail-field">
              <label>Invoice Contact</label>
              <div class="field-value">${enquiry.billing_contact_name}${enquiry.billing_contact_email ? ` · ${enquiry.billing_contact_email}` : ''}</div>
            </div>` : ''}
            ${enquiry.billing_address ? `
            <div class="detail-field">
              <label>Invoice Address</label>
              <div class="field-value" style="white-space:pre-wrap;">${enquiry.billing_address}</div>
            </div>` : ''}
            ${enquiry.report_addressee_name ? `
            <div class="detail-field">
              <label>Report Addressee</label>
              <div class="field-value">${enquiry.report_addressee_name}</div>
            </div>` : ''}
            ${enquiry.report_addressee_address ? `
            <div class="detail-field">
              <label>Report Address</label>
              <div class="field-value" style="white-space:pre-wrap;">${enquiry.report_addressee_address}</div>
            </div>` : ''}
            ${enquiry.client_site_access ? `
            <div class="detail-field">
              <label>Site Access</label>
              <div class="field-value" style="white-space:pre-wrap;">${enquiry.client_site_access}</div>
            </div>` : ''}
          </div>
        </div>` : ''}

      </div>
    </div>
  `;
}

// ============================================================
// INTERNAL NOTES
// ============================================================

function toggleEnqNote() {
  const display = document.getElementById('enqNoteDisplay');
  const editor  = document.getElementById('enqNoteEditor');
  const btn     = document.getElementById('enqNoteBtn');
  const isEditing = editor.style.display !== 'none';
  display.style.display = isEditing ? '' : 'none';
  editor.style.display  = isEditing ? 'none' : '';
  btn.textContent = isEditing ? (enquiry.internal_notes ? 'Edit' : 'Add note') : 'Cancel';
}

async function saveEnqNote() {
  const text = document.getElementById('enqNoteText').value.trim();
  try {
    await dbUpdate('enquiries', `id=eq.${enquiryId}`, { internal_notes: text || null });
    enquiry.internal_notes = text || null;
    showToast('Note saved');
    renderEnquiry();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

// ============================================================
// SEND QUOTE EMAIL
// ============================================================

function buildQuoteEmail() {
  const surveyLabel = getSurveyLabel(enquiry.survey_type);
  const deadlineLabel = getDeadlineLabel(enquiry.deadline_tier);
  const price = '£' + Number(enquiry.quoted_price).toLocaleString() + ' + VAT';
  const subject = `Your Tree Survey Quote — ${enquiry.job_number || 'THAC'} | ${price}`;

  const acceptLink = `https://ciaran-aut-ai.github.io/thac-admin/accept-quote.html?id=${enquiryId}`;
  const declineLink = `https://ciaran-aut-ai.github.io/thac-admin/accept-quote.html?id=${enquiryId}&action=decline`;

  const body = [
    `Dear ${enquiry.contact_name || 'there'},`,
    '',
    `Thank you for your enquiry. Please find your quote below.`,
    '',
    `Reference:     ${enquiry.job_number || 'Pending'}`,
    `Survey Type:   ${surveyLabel}`,
    `Site Postcode: ${enquiry.site_postcode || '—'}`,
    `Deadline:      ${deadlineLabel}`,
    `Quote:         ${price}`,
    '',
    `To accept or decline this quote, simply click one of the links below:`,
    '',
    `Accept: ${acceptLink}`,
    `Decline: ${declineLink}`,
    '',
    `Or reply to this email if you have any questions.`,
    '',
    `This quote is valid for 30 days from today. Payment is due 30 days from invoice date.`,
    '',
    `Kind regards,`,
    `Trevor Heaps`,
    `Trevor Heaps Arboricultural Consultancy Ltd.`,
  ].join('\n');

  return `mailto:${enquiry.contact_email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

async function updateStatus() {
  const newStatus = document.getElementById('statusSelect').value;
  try {
    await dbUpdate('enquiries', `id=eq.${enquiryId}`, { status: newStatus });
    enquiry.status = newStatus;
    showToast('Status updated successfully');
    renderEnquiry();
  } catch (e) {
    showToast('Error updating status: ' + e.message, 'error');
  }
}

// ============================================================
// CONVERT TO JOB
// ============================================================
function calcSlaDeadline(deadlineTier) {
  const daysMap = { '1day': 1, '3days': 3, '5days': 5, '10days': 10 };
  const days = daysMap[deadlineTier] || 5;
  let count = 0;
  let date = new Date();
  while (count < days) {
    date.setDate(date.getDate() + 1);
    const dow = date.getDay();
    if (dow !== 0 && dow !== 6) count++; // skip weekends
  }
  return date.toISOString().slice(0, 10);
}

function openConvertModal() {
  // Pre-fill from enquiry data
  document.getElementById('cvtName').value = enquiry.contact_name || '';
  document.getElementById('cvtEmail').value = enquiry.contact_email || '';
  document.getElementById('cvtPhone').value = enquiry.contact_phone || '';
  document.getElementById('cvtCompany').value = enquiry.company || '';
  document.getElementById('cvtPostcode').value = enquiry.site_postcode || '';

  // Map enquiry form survey type keys → admin CRM keys
  const surveyTypeMap = {
    planning_stage1:  'bs5837',
    planning_stage2:  'bc',
    health_safety:    'vta',
    insurer_mortgage: 'mortgage',
    subsidence:       'subs',
    nhbc:             'other',
    site_visit:       'other',
    resistograph:     'other',
  };
  const mappedType = surveyTypeMap[enquiry.survey_type] || enquiry.survey_type || '';
  const st = document.getElementById('cvtSurveyType');
  if (mappedType) {
    for (let opt of st.options) {
      if (opt.value === mappedType) { opt.selected = true; break; }
    }
  }

  // Set urgency from deadline tier
  const urgMap = { '1day': 'red', '3days': 'orange', '5days': 'yellow', '10days': 'grey' };
  const urg = document.getElementById('cvtUrgency');
  const urgVal = urgMap[enquiry.deadline_tier] || 'standard';
  for (let opt of urg.options) {
    if (opt.value === urgVal) { opt.selected = true; break; }
  }

  // Pre-fill quoted amount from enquiry
  if (enquiry.quoted_price) {
    document.getElementById('cvtAmount').value = enquiry.quoted_price;
  }

  // Pre-fill billing contact + site access from client Step 2 submission
  if (enquiry.billing_contact_name || enquiry.billing_contact_email) {
    const noteLines = [];
    if (enquiry.billing_contact_name)  noteLines.push(`Billing: ${enquiry.billing_contact_name}`);
    if (enquiry.billing_contact_email) noteLines.push(`Billing email: ${enquiry.billing_contact_email}`);
    if (enquiry.client_site_access)    noteLines.push(`Site access: ${enquiry.client_site_access}`);
    const notesEl = document.getElementById('cvtNotes');
    if (!notesEl.value) notesEl.value = noteLines.join('\n');
  }

  // Auto-switch billing to staged when two-stage is ticked
  document.getElementById('cvtTwoStage').onchange = function() {
    if (this.checked) document.getElementById('cvtBilling').value = 'staged';
  };

  document.getElementById('convertModal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('convertModal').style.display = 'none';
}

async function confirmConvert() {
  const name = document.getElementById('cvtName').value.trim();
  const email = document.getElementById('cvtEmail').value.trim();
  const postcode = document.getElementById('cvtPostcode').value.trim().toUpperCase();

  if (!name || !email || !postcode) {
    showToast('Name, email and postcode are required', 'error');
    return;
  }

  const btn = document.getElementById('cvtBtn');
  btn.textContent = 'Creating...';
  btn.disabled = true;

  try {
    // Step 1 — Get or create client record
    const companyName = document.getElementById('cvtCompany').value.trim();
    let clientId = null;

    // Check if client with this email already exists
    const existing = await dbGet('clients', { 'email': `eq.${email}`, 'select': 'id', 'limit': 1 });
    if (existing && existing.length > 0) {
      clientId = existing[0].id;
    } else {
      // Create new client
      const clientData = await dbInsert('clients', {
        full_name: name,
        company_name: companyName || name,
        email: email,
        phone: document.getElementById('cvtPhone').value.trim() || null,
        address_postcode: postcode,
        client_type: companyName ? 'company' : 'individual',
      });
      clientId = clientData[0].id;
    }

    // Step 2 — Create job record
    const amount = document.getElementById('cvtAmount').value;
    const surchargeMap = { '1day': 150, '3days': 50, '5days': 0, '10days': 0 };
    const urgency_surcharge = surchargeMap[enquiry.deadline_tier] ?? null;
    const sla_deadline = calcSlaDeadline(enquiry.deadline_tier);

    const jobData = await dbInsert('jobs', {
      survey_type: document.getElementById('cvtSurveyType').value,
      site_postcode: postcode,
      home_lat: enquiry.home_lat || null,
      home_lng: enquiry.home_lng || null,
      urgency_state: document.getElementById('cvtUrgency').value,
      job_type: 'new',
      dispatch_state: 'pending_approval',
      billing_mode: document.getElementById('cvtBilling').value,
      quoted_amount: amount ? parseFloat(amount) : null,
      agreed_amount: amount ? parseFloat(amount) : null,
      urgency_surcharge: urgency_surcharge || null,
      sla_deadline,
      is_two_stage: document.getElementById('cvtTwoStage').checked,
      arranging_client_id: clientId,
      end_client_name:          enquiry.end_client_name          || null,
      end_client_email:         enquiry.end_client_email         || null,
      billing_contact_name:     enquiry.billing_contact_name     || null,
      billing_contact_email:    enquiry.billing_contact_email    || null,
      billing_address:          enquiry.billing_address          || null,
      report_addressee_name:    enquiry.report_addressee_name    || null,
      report_addressee_address: enquiry.report_addressee_address || null,
      site_access_notes:        enquiry.client_site_access       || null,
      internal_notes: document.getElementById('cvtNotes').value.trim() || null,
    });

    const jobId = jobData[0].id;

    // Step 3 — Update enquiry status to accepted
    await dbUpdate('enquiries', `id=eq.${enquiryId}`, { status: 'accepted' });

    closeModal();
    showToast('Job created successfully! Redirecting...');

    setTimeout(() => {
      window.location.href = `job-detail.html?id=${jobId}`;
    }, 1500);

  } catch (e) {
    showToast('Error creating job: ' + e.message, 'error');
    btn.textContent = '✓ Create Job';
    btn.disabled = false;
  }
}

init();
</script>
</body>
</html>
