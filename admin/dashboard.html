<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THAC CRM — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/thac.css">
</head>
<body>
<div class="app-layout" id="app"></div>

<script src="js/supabase.js"></script>
<script src="js/thac.js"></script>
<script>
requireAuth();

async function init() {
  document.getElementById('app').innerHTML = `
    ${renderSidebar('dashboard')}
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-title">Dashboard</div>
        <div class="topbar-search">
          <span>🔍</span>
          <input type="text" placeholder="Search jobs, clients, enquiries..." id="globalSearch">
        </div>
        <span style="font-size:13px;color:var(--text-muted)">${new Date().toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'})}</span>
      </div>
      <div class="page-body">

        <!-- Stat Cards -->
        <div class="stat-grid" id="statGrid">
          <div class="stat-card urgent">
            <div class="stat-label">🔴 Urgent Jobs</div>
            <div class="stat-value" id="statUrgent">—</div>
            <div class="stat-sub">Due within 1 working day</div>
          </div>
          <div class="stat-card elevated">
            <div class="stat-label">🟠 Elevated Jobs</div>
            <div class="stat-value" id="statElevated">—</div>
            <div class="stat-sub">Due within 3 working days</div>
          </div>
          <div class="stat-card standard">
            <div class="stat-label">🟡 Standard Jobs</div>
            <div class="stat-value" id="statStandard">—</div>
            <div class="stat-sub">Due within 5 working days</div>
          </div>
          <div class="stat-card complete">
            <div class="stat-label">⚫ Low Priority Jobs</div>
            <div class="stat-value" id="statLow">—</div>
            <div class="stat-sub">10+ working days</div>
          </div>
        </div>

        <!-- Two column layout -->
        <div style="display:grid;grid-template-columns:1fr 380px;gap:20px;">

          <!-- Urgency Dashboard -->
          <div class="card">
            <div class="card-title">
              Active Jobs by Urgency
              <a href="jobs.html" class="btn btn-secondary btn-sm">View All Jobs</a>
            </div>
            <div id="urgencyDashboard"><div class="loading"><div class="spinner"></div><br>Loading jobs...</div></div>
          </div>

          <!-- Recent Enquiries -->
          <div class="card">
            <div class="card-title">
              Recent Enquiries
              <a href="enquiries.html" class="btn btn-secondary btn-sm">View All</a>
            </div>
            <div id="recentEnquiries"><div class="loading"><div class="spinner"></div><br>Loading...</div></div>
          </div>

        </div>
      </div>
    </div>
  `;

  await Promise.all([
    loadStats(),
    loadUrgencyDashboard(),
    loadRecentEnquiries(),
    loadEnquiryBadge()
  ]);
}

// ============================================================
// STATS — job counts by urgency state
// ============================================================
async function loadStats() {
  try {
    const [urgent, elevated, standard, low] = await Promise.all([
      dbGet('jobs', { 'urgency_state': 'eq.red',    'is_archived': 'not.eq.true', 'select': 'id' }),
      dbGet('jobs', { 'urgency_state': 'eq.orange', 'is_archived': 'not.eq.true', 'select': 'id' }),
      dbGet('jobs', { 'urgency_state': 'eq.yellow', 'is_archived': 'not.eq.true', 'select': 'id' }),
      dbGet('jobs', { 'urgency_state': 'eq.grey',   'is_archived': 'not.eq.true', 'select': 'id' }),
    ]);

    document.getElementById('statUrgent').textContent   = urgent?.length   || 0;
    document.getElementById('statElevated').textContent = elevated?.length || 0;
    document.getElementById('statStandard').textContent = standard?.length || 0;
    document.getElementById('statLow').textContent      = low?.length      || 0;
  } catch (e) {
    console.error('Stats error:', e);
  }
}

// ============================================================
// URGENCY DASHBOARD — active jobs sorted by urgency state
// ============================================================

function jobUrgencyRowClass(state) {
  switch (state) {
    case 'red':    return 'urgency-urgent';
    case 'orange': return 'urgency-elevated';
    case 'yellow': return 'urgency-standard';
    default:       return 'urgency-low';
  }
}

function slaCountdown(dateStr) {
  if (!dateStr) return '<span class="muted">No SLA set</span>';
  const days = Math.ceil((new Date(dateStr) - Date.now()) / (1000 * 60 * 60 * 24));
  if (days < 0)  return `<span style="color:#dc2626;font-weight:700;">⚠️ ${Math.abs(days)}d overdue</span>`;
  if (days === 0) return `<span style="color:#dc2626;font-weight:700;">⚠️ Due today</span>`;
  if (days <= 1)  return `<span style="color:#dc2626;font-weight:600;">🔴 ${days}d left</span>`;
  if (days <= 3)  return `<span style="color:#ea580c;font-weight:600;">🟠 ${days}d left</span>`;
  if (days <= 5)  return `<span style="color:#ca8a04;font-weight:600;">🟡 ${days}d left</span>`;
  return `<span style="color:var(--text-muted);">${days}d left</span>`;
}

function dispatchBadge(state) {
  const map = {
    pending_approval: ['⏳ Pending', 'badge-low'],
    red:      ['🔴 Unallocated', 'badge-urgent'],
    orange:   ['🟠 Claimed',     'badge-elevated'],
    yellow:   ['🟡 Attended',    'badge-standard'],
    green:    ['🟢 Report Sent', 'badge-accepted'],
    archived: ['📦 Archived',   'badge-low'],
  };
  const [label, cls] = map[state] || [state || '—', 'badge-low'];
  return `<span class="badge ${cls}">${label}</span>`;
}

function urgencyStateBadge(state) {
  const map = {
    red:    ['🔴 Urgent',   'badge-urgent'],
    orange: ['🟠 Elevated', 'badge-elevated'],
    yellow: ['🟡 Standard', 'badge-standard'],
    grey:   ['⚫ Low',      'badge-low'],
    green:  ['🟢 Complete', 'badge-accepted'],
  };
  const [label, cls] = map[state] || [state || '—', 'badge-low'];
  return `<span class="badge ${cls}">${label}</span>`;
}

async function loadUrgencyDashboard() {
  try {
    const jobs = await dbGet('jobs', {
      'select': 'id,reference,survey_type,job_type,urgency_state,dispatch_state,site_postcode,survey_date,agreed_amount,sla_deadline',
      'is_archived': 'not.eq.true',
      'order': 'created_at.desc',
      'limit': 50
    });

    if (!jobs || jobs.length === 0) {
      document.getElementById('urgencyDashboard').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">💼</div>
          <h3>No active jobs</h3>
          <p>Jobs will appear here once enquiries are converted</p>
        </div>`;
      return;
    }

    // Sort red → orange → yellow → grey → green
    const order = { red: 0, orange: 1, yellow: 2, grey: 3, green: 4 };
    jobs.sort((a, b) => (order[a.urgency_state] ?? 99) - (order[b.urgency_state] ?? 99));

    const rows = jobs.map(j => `
      <tr class="${jobUrgencyRowClass(j.urgency_state)}"
          onclick="window.location.href='job-detail.html?id=${j.id}'" style="cursor:pointer">
        <td>
          <div class="ref">${j.reference || '—'}</div>
          <div class="muted">${j.survey_date ? formatDate(j.survey_date) : 'No date set'}</div>
        </td>
        <td>${getSurveyLabel(j.survey_type || j.job_type)}</td>
        <td>${j.site_postcode || '—'}</td>
        <td>${slaCountdown(j.sla_deadline)}</td>
        <td>${j.agreed_amount ? '£' + Number(j.agreed_amount).toLocaleString() : '—'}</td>
        <td>${dispatchBadge(j.dispatch_state)}</td>
      </tr>
    `).join('');

    document.getElementById('urgencyDashboard').innerHTML = `
      <table class="data-table">
        <thead>
          <tr>
            <th>Reference</th>
            <th>Survey Type</th>
            <th>Postcode</th>
            <th>SLA Deadline</th>
            <th>Value</th>
            <th>Dispatch</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  } catch (e) {
    document.getElementById('urgencyDashboard').innerHTML = `<div class="empty-state"><p>Error loading jobs: ${e.message}</p></div>`;
  }
}

// ============================================================
// RECENT ENQUIRIES
// ============================================================
async function loadRecentEnquiries() {
  try {
    const enquiries = await dbGet('enquiries', {
      'select': 'id,job_number,contact_name,survey_type,status,submitted_at',
      'order': 'submitted_at.desc',
      'limit': 8
    });

    if (!enquiries || enquiries.length === 0) {
      document.getElementById('recentEnquiries').innerHTML = `<div class="empty-state"><p>No enquiries yet</p></div>`;
      return;
    }

    const items = enquiries.map(e => `
      <div onclick="window.location.href='enquiry-detail.html?id=${e.id}'" style="padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;" class="hover-row">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
          <span class="ref" style="font-size:12px;">${e.job_number || 'Pending'}</span>
          ${statusBadge(e.status)}
        </div>
        <div style="font-size:13px;font-weight:500;color:var(--text);">${e.contact_name || '—'}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${getSurveyLabel(e.survey_type)} · ${timeAgo(e.submitted_at)}</div>
      </div>
    `).join('');

    document.getElementById('recentEnquiries').innerHTML = `<div>${items}</div>`;
  } catch (e) {
    document.getElementById('recentEnquiries').innerHTML = `<div class="empty-state"><p>Error: ${e.message}</p></div>`;
  }
}

init();
</script>
</body>
</html>
