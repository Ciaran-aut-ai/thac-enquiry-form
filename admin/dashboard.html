<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THAC CRM — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/thac.css">
</head>
<body>
<div class="app-layout" id="app"></div>

<script src="js/supabase.js"></script>
<script src="js/thac.js"></script>
<script>
requireAuth();

async function init() {
  document.getElementById('app').innerHTML = `
    ${renderSidebar('dashboard')}
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-title">Dashboard</div>
        <div class="topbar-search" style="position:relative;">
          <span>🔍</span>
          <input type="text" placeholder="Search jobs, clients, enquiries..." id="globalSearch"
            oninput="handleGlobalSearch(this.value)" autocomplete="off">
          <div id="searchResults" style="display:none;position:absolute;top:100%;left:0;right:0;
            background:white;border:1px solid var(--border);border-radius:10px;
            box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:200;max-height:360px;overflow-y:auto;margin-top:4px;">
          </div>
        </div>
        <span style="font-size:13px;color:var(--text-muted)">${new Date().toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'})}</span>
      </div>
      <div class="page-body">

        <!-- Stat Cards -->
        <div class="stat-grid" id="statGrid">
          <div class="stat-card urgent" onclick="window.location.href='jobs.html?urgency=red'" style="cursor:pointer;">
            <div class="stat-label">🔴 Urgent Jobs</div>
            <div class="stat-value" id="statUrgent">—</div>
            <div class="stat-sub">Due within 1 working day</div>
          </div>
          <div class="stat-card elevated" onclick="window.location.href='jobs.html?urgency=orange'" style="cursor:pointer;">
            <div class="stat-label">🟠 Elevated Jobs</div>
            <div class="stat-value" id="statElevated">—</div>
            <div class="stat-sub">Due within 3 working days</div>
          </div>
          <div class="stat-card standard" onclick="window.location.href='jobs.html?urgency=yellow'" style="cursor:pointer;">
            <div class="stat-label">🟡 Standard Jobs</div>
            <div class="stat-value" id="statStandard">—</div>
            <div class="stat-sub">Due within 5 working days</div>
          </div>
          <div class="stat-card complete" onclick="window.location.href='jobs.html?urgency=grey'" style="cursor:pointer;">
            <div class="stat-label">⚫ Low Priority Jobs</div>
            <div class="stat-value" id="statLow">—</div>
            <div class="stat-sub">10+ working days</div>
          </div>
        </div>

        <!-- Revenue Summary -->
        <div class="stat-grid" id="revenueGrid" style="grid-template-columns:repeat(2,1fr);margin-bottom:0;">
          <div class="stat-card" style="background:#f0fdf4;border-left:3px solid #16a34a;">
            <div class="stat-label" style="color:#16a34a;">💰 This Month</div>
            <div class="stat-value" id="revMonth" style="color:#16a34a;">—</div>
            <div class="stat-sub">Invoiced in <span id="revMonthLabel"></span></div>
          </div>
          <div class="stat-card" style="background:#f0fdf4;border-left:3px solid #16a34a;">
            <div class="stat-label" style="color:#16a34a;">📊 This Year</div>
            <div class="stat-value" id="revYear" style="color:#16a34a;">—</div>
            <div class="stat-sub">Total invoiced <span id="revYearLabel"></span></div>
          </div>
        </div>

        <!-- Two column layout -->
        <div style="display:grid;grid-template-columns:1fr 380px;gap:20px;">

          <!-- Urgency Dashboard -->
          <div class="card">
            <div class="card-title">
              Active Jobs by Urgency
              <a href="jobs.html" class="btn btn-secondary btn-sm">View All Jobs</a>
            </div>
            <div id="urgencyDashboard"><div class="loading"><div class="spinner"></div><br>Loading jobs...</div></div>
          </div>

          <!-- Recent Enquiries -->
          <div class="card">
            <div class="card-title">
              Recent Enquiries
              <a href="enquiries.html" class="btn btn-secondary btn-sm">View All</a>
            </div>
            <div id="recentEnquiries"><div class="loading"><div class="spinner"></div><br>Loading...</div></div>
          </div>

        </div>
      </div>
    </div>
  `;

  await Promise.all([
    loadStats(),
    loadRevenue(),
    loadUrgencyDashboard(),
    loadRecentEnquiries(),
    loadEnquiryBadge()
  ]);
}

// ============================================================
// STATS — job counts by urgency state
// ============================================================
async function loadStats() {
  try {
    const [urgent, elevated, standard, low] = await Promise.all([
      dbGet('jobs', { 'urgency_state': 'eq.red',    'is_archived': 'not.eq.true', 'select': 'id' }),
      dbGet('jobs', { 'urgency_state': 'eq.orange', 'is_archived': 'not.eq.true', 'select': 'id' }),
      dbGet('jobs', { 'urgency_state': 'eq.yellow', 'is_archived': 'not.eq.true', 'select': 'id' }),
      dbGet('jobs', { 'urgency_state': 'eq.grey',   'is_archived': 'not.eq.true', 'select': 'id' }),
    ]);

    document.getElementById('statUrgent').textContent   = urgent?.length   || 0;
    document.getElementById('statElevated').textContent = elevated?.length || 0;
    document.getElementById('statStandard').textContent = standard?.length || 0;
    document.getElementById('statLow').textContent      = low?.length      || 0;
  } catch (e) {
    console.error('Stats error:', e);
  }
}

// ============================================================
// REVENUE SUMMARY
// ============================================================

async function loadRevenue() {
  try {
    const now   = new Date();
    const month = now.getMonth();
    const year  = now.getFullYear();

    document.getElementById('revMonthLabel').textContent =
      now.toLocaleString('en-GB', { month: 'long' });
    document.getElementById('revYearLabel').textContent = year;

    const jobs = await dbGet('jobs', {
      'select': 'invoice1_date,invoice1_amount,invoice1_paid,invoice2_date,invoice2_amount,invoice2_paid',
      'invoice1_date': 'not.is.null'
    });

    if (!jobs) return;

    let thisMonth = 0, thisYear = 0;

    jobs.forEach(j => {
      // Invoice 1
      if (j.invoice1_date) {
        const d = new Date(j.invoice1_date);
        const amt = Number(j.invoice1_amount) || 0;
        if (d.getFullYear() === year && d.getMonth() === month) thisMonth += amt;
        if (d.getFullYear() === year) thisYear += amt;
      }
      // Invoice 2
      if (j.invoice2_date) {
        const d = new Date(j.invoice2_date);
        const amt = Number(j.invoice2_amount) || 0;
        if (d.getFullYear() === year && d.getMonth() === month) thisMonth += amt;
        if (d.getFullYear() === year) thisYear += amt;
      }
    });

    const fmt = n => n > 0 ? '£' + n.toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) : '£0';
    document.getElementById('revMonth').textContent = fmt(thisMonth);
    document.getElementById('revYear').textContent  = fmt(thisYear);
  } catch (e) {
    console.error('Revenue error:', e);
  }
}

// ============================================================
// URGENCY DASHBOARD — active jobs sorted by urgency state
// ============================================================

function jobUrgencyRowClass(state) {
  switch (state) {
    case 'red':    return 'urgency-urgent';
    case 'orange': return 'urgency-elevated';
    case 'yellow': return 'urgency-standard';
    default:       return 'urgency-low';
  }
}

function slaCountdown(dateStr) {
  if (!dateStr) return '<span class="muted">No SLA set</span>';
  const days = Math.ceil((new Date(dateStr) - Date.now()) / (1000 * 60 * 60 * 24));
  if (days < 0)  return `<span style="color:#dc2626;font-weight:700;">⚠️ ${Math.abs(days)}d overdue</span>`;
  if (days === 0) return `<span style="color:#dc2626;font-weight:700;">⚠️ Due today</span>`;
  if (days <= 1)  return `<span style="color:#dc2626;font-weight:600;">🔴 ${days}d left</span>`;
  if (days <= 3)  return `<span style="color:#ea580c;font-weight:600;">🟠 ${days}d left</span>`;
  if (days <= 5)  return `<span style="color:#ca8a04;font-weight:600;">🟡 ${days}d left</span>`;
  return `<span style="color:var(--text-muted);">${days}d left</span>`;
}

function dispatchBadge(state) {
  const map = {
    pending_approval:  ['⏳ Pending',          'badge-low'],
    waiting_for_plans: ['🕐 Waiting for Plans', 'badge-low'],
    red:      ['🔴 Unallocated', 'badge-urgent'],
    orange:   ['🟠 Claimed',     'badge-elevated'],
    yellow:   ['🟡 Attended',    'badge-standard'],
    green:    ['🟢 Report Sent', 'badge-accepted'],
    archived: ['📦 Archived',   'badge-low'],
  };
  const [label, cls] = map[state] || [state || '—', 'badge-low'];
  return `<span class="badge ${cls}">${label}</span>`;
}

function urgencyStateBadge(state) {
  const map = {
    red:    ['🔴 Urgent',   'badge-urgent'],
    orange: ['🟠 Elevated', 'badge-elevated'],
    yellow: ['🟡 Standard', 'badge-standard'],
    grey:   ['⚫ Low',      'badge-low'],
    green:  ['🟢 Complete', 'badge-accepted'],
  };
  const [label, cls] = map[state] || [state || '—', 'badge-low'];
  return `<span class="badge ${cls}">${label}</span>`;
}

async function loadUrgencyDashboard() {
  try {
    const jobs = await dbGet('jobs', {
      'select': 'id,reference,survey_type,job_type,urgency_state,dispatch_state,site_postcode,survey_date,agreed_amount,sla_deadline',
      'is_archived': 'not.eq.true',
      'order': 'created_at.desc',
      'limit': 50
    });

    if (!jobs || jobs.length === 0) {
      document.getElementById('urgencyDashboard').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">💼</div>
          <h3>No active jobs</h3>
          <p>Jobs will appear here once enquiries are converted</p>
        </div>`;
      return;
    }

    // Sort red → orange → yellow → grey → green
    const order = { red: 0, orange: 1, yellow: 2, grey: 3, green: 4 };
    jobs.sort((a, b) => (order[a.urgency_state] ?? 99) - (order[b.urgency_state] ?? 99));

    const rows = jobs.map(j => `
      <tr class="${jobUrgencyRowClass(j.urgency_state)}"
          onclick="window.location.href='job-detail.html?id=${j.id}'" style="cursor:pointer">
        <td>
          <div class="ref">${j.reference || '—'}</div>
          <div class="muted">${j.survey_date ? formatDate(j.survey_date) : 'No date set'}</div>
        </td>
        <td>${getSurveyLabel(j.survey_type || j.job_type)}</td>
        <td>${j.site_postcode || '—'}</td>
        <td>${slaCountdown(j.sla_deadline)}</td>
        <td>${j.agreed_amount ? '£' + Number(j.agreed_amount).toLocaleString() : '—'}</td>
        <td>${dispatchBadge(j.dispatch_state)}</td>
      </tr>
    `).join('');

    document.getElementById('urgencyDashboard').innerHTML = `
      <table class="data-table">
        <thead>
          <tr>
            <th>Reference</th>
            <th>Survey Type</th>
            <th>Postcode</th>
            <th>SLA Deadline</th>
            <th>Value</th>
            <th>Dispatch</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  } catch (e) {
    document.getElementById('urgencyDashboard').innerHTML = `<div class="empty-state"><p>Error loading jobs: ${e.message}</p></div>`;
  }
}

// ============================================================
// RECENT ENQUIRIES
// ============================================================
async function loadRecentEnquiries() {
  try {
    const enquiries = await dbGet('enquiries', {
      'select': 'id,job_number,contact_name,survey_type,status,submitted_at',
      'order': 'submitted_at.desc',
      'limit': 8
    });

    if (!enquiries || enquiries.length === 0) {
      document.getElementById('recentEnquiries').innerHTML = `<div class="empty-state"><p>No enquiries yet</p></div>`;
      return;
    }

    const items = enquiries.map(e => `
      <div onclick="window.location.href='enquiry-detail.html?id=${e.id}'" style="padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;" class="hover-row">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
          <span class="ref" style="font-size:12px;">${e.job_number || 'Pending'}</span>
          ${statusBadge(e.status)}
        </div>
        <div style="font-size:13px;font-weight:500;color:var(--text);">${e.contact_name || '—'}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${getSurveyLabel(e.survey_type)} · ${timeAgo(e.submitted_at)}</div>
      </div>
    `).join('');

    document.getElementById('recentEnquiries').innerHTML = `<div>${items}</div>`;
  } catch (e) {
    document.getElementById('recentEnquiries').innerHTML = `<div class="empty-state"><p>Error: ${e.message}</p></div>`;
  }
}

// ============================================================
// GLOBAL SEARCH
// ============================================================

let _searchTimer = null;

function handleGlobalSearch(q) {
  clearTimeout(_searchTimer);
  const box = document.getElementById('searchResults');
  if (!q || q.trim().length < 2) { box.style.display = 'none'; return; }
  box.style.display = 'block';
  box.innerHTML = '<div style="padding:12px 16px;font-size:13px;color:var(--text-muted);">Searching…</div>';
  _searchTimer = setTimeout(() => runGlobalSearch(q.trim()), 300);
}

async function runGlobalSearch(q) {
  const box = document.getElementById('searchResults');
  try {
    const [jobs, enquiries, clients] = await Promise.all([
      dbGet('jobs', {
        'select': 'id,reference,survey_type,site_postcode,dispatch_state',
        'or': `reference.ilike.*${q}*,site_postcode.ilike.*${q}*`,
        'limit': 5
      }),
      dbGet('enquiries', {
        'select': 'id,job_number,contact_name,survey_type,status',
        'or': `job_number.ilike.*${q}*,contact_name.ilike.*${q}*,contact_email.ilike.*${q}*`,
        'limit': 5
      }),
      dbGet('clients', {
        'select': 'id,full_name,company_name,email',
        'or': `full_name.ilike.*${q}*,company_name.ilike.*${q}*,email.ilike.*${q}*`,
        'limit': 5
      }),
    ]);

    const sections = [];

    if (jobs?.length) {
      sections.push(`<div style="padding:8px 16px;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;">Jobs</div>`);
      jobs.forEach(j => {
        sections.push(`<a href="job-detail.html?id=${j.id}" style="display:flex;align-items:center;gap:10px;padding:10px 16px;text-decoration:none;color:var(--text);" class="hover-row">
          <span style="font-size:16px;">💼</span>
          <div>
            <div style="font-weight:600;font-size:13px;">${j.reference || '—'}</div>
            <div style="font-size:12px;color:var(--text-muted);">${getSurveyLabel(j.survey_type)} · ${j.site_postcode || '—'}</div>
          </div>
        </a>`);
      });
    }

    if (enquiries?.length) {
      sections.push(`<div style="padding:8px 16px;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;border-top:1px solid var(--border);">Enquiries</div>`);
      enquiries.forEach(e => {
        sections.push(`<a href="enquiry-detail.html?id=${e.id}" style="display:flex;align-items:center;gap:10px;padding:10px 16px;text-decoration:none;color:var(--text);" class="hover-row">
          <span style="font-size:16px;">📥</span>
          <div>
            <div style="font-weight:600;font-size:13px;">${e.contact_name || e.job_number || '—'}</div>
            <div style="font-size:12px;color:var(--text-muted);">${e.job_number || 'Pending'} · ${getSurveyLabel(e.survey_type)}</div>
          </div>
        </a>`);
      });
    }

    if (clients?.length) {
      sections.push(`<div style="padding:8px 16px;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;border-top:1px solid var(--border);">Clients</div>`);
      clients.forEach(c => {
        sections.push(`<a href="client-detail.html?id=${c.id}" style="display:flex;align-items:center;gap:10px;padding:10px 16px;text-decoration:none;color:var(--text);" class="hover-row">
          <span style="font-size:16px;">👤</span>
          <div>
            <div style="font-weight:600;font-size:13px;">${c.company_name || c.full_name || '—'}</div>
            <div style="font-size:12px;color:var(--text-muted);">${c.email || ''}</div>
          </div>
        </a>`);
      });
    }

    if (!sections.length) {
      box.innerHTML = `<div style="padding:16px;font-size:13px;color:var(--text-muted);text-align:center;">No results for "${q}"</div>`;
    } else {
      box.innerHTML = sections.join('');
    }
  } catch (e) {
    box.innerHTML = `<div style="padding:12px 16px;font-size:13px;color:var(--text-muted);">Error: ${e.message}</div>`;
  }
}

// Close search results when clicking outside
document.addEventListener('click', e => {
  if (!e.target.closest('.topbar-search')) {
    document.getElementById('searchResults').style.display = 'none';
  }
});

init();
</script>
</body>
</html>
