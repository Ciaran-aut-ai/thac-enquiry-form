<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Quote Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: #f0f7f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    h1 { font-size: 24px; font-weight: 700; color: #1a3c2e; margin-bottom: 12px; }
    .sub { font-size: 14px; color: #666; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input, select { width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; font-family: inherit; }
    .btn { width: 100%; padding: 14px 24px; border-radius: 10px; font-size: 15px; font-weight: 600; border: none; cursor: pointer; margin-top: 12px; }
    .btn-primary { background: #1a3c2e; color: white; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { margin-top: 20px; padding: 16px; border-radius: 8px; font-size: 13px; display: none; }
    .status.success { background: #dcfce7; color: #166534; display: block; }
    .status.error { background: #fee2e2; color: #991b1b; display: block; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #1a3c2e; border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚡ Test Quote Generator</h1>
    <p class="sub">Quickly generate a test quote and send it to ciaran@aut-ai.com</p>

    <div class="form-group">
      <label>Postcode</label>
      <input type="text" id="postcode" value="BH1 1AA" placeholder="e.g. BH1 1AA">
    </div>

    <div class="form-group">
      <label>Survey Type</label>
      <select id="surveyType">
        <option value="bs5837">BS5837 Tree Survey (Planning)</option>
        <option value="vta">Visual Tree Assessment (VTA)</option>
        <option value="mortgage">Mortgage / Insurer Report</option>
        <option value="subs">Subsidence / Building Damage</option>
      </select>
    </div>

    <div class="form-group">
      <label>Quoted Price (£)</label>
      <input type="number" id="price" value="350" min="0" step="10">
    </div>

    <div class="form-group">
      <label>Deadline</label>
      <select id="deadline">
        <option value="1day">Within 1 working day</option>
        <option value="3days">Within 3 working days</option>
        <option value="5days" selected>Within 5 working days</option>
        <option value="10days">Within 10 working days</option>
      </select>
    </div>

    <button class="btn btn-primary" onclick="generateTest()" id="generateBtn">
      Generate & Send Test Quote
    </button>

    <div class="status" id="status"></div>
  </div>

  <script src="js/supabase.js"></script>
  <script>
    async function generateTest() {
      const btn = document.getElementById('generateBtn');
      const status = document.getElementById('status');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Generating...';
      status.className = 'status';
      status.textContent = '';

      try {
        // Create enquiry
        const enquiry = await dbInsert('enquiries', {
          contact_name: 'Ciaran Murphy',
          contact_email: 'ciaran@aut-ai.com',
          contact_phone: '07700 900123',
          company: 'Test Company',
          survey_type: document.getElementById('surveyType').value,
          site_postcode: document.getElementById('postcode').value.toUpperCase(),
          deadline_tier: document.getElementById('deadline').value,
          quoted_price: parseFloat(document.getElementById('price').value),
          status: 'quoted',
          job_number: 'TEST-' + Math.random().toString(36).substr(2, 9).toUpperCase(),
          tree_count_band: '20-50',
          enquiry_type: 'new',
          submitted_at: new Date().toISOString()
        });

        const enquiryId = enquiry[0].id;
        const jobNumber = enquiry[0].job_number;

        // Send quote email
        const emailResponse = await fetch('https://lemppaqgpntadeylzzwn.supabase.co/functions/v1/send-quote-email', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            enquiry_id: enquiryId,
            contact_email: 'ciaran@aut-ai.com',
            contact_name: 'Ciaran Murphy',
            quoted_price: document.getElementById('price').value,
            deadline_tier: document.getElementById('deadline').value,
            survey_type: document.getElementById('surveyType').value,
            job_number: jobNumber,
            site_postcode: document.getElementById('postcode').value.toUpperCase()
          })
        });

        if (emailResponse.ok) {
          status.className = 'status success';
          status.innerHTML = `
            ✅ <strong>Quote generated & email sent!</strong><br>
            Job: ${jobNumber}<br>
            To: ciaran@aut-ai.com<br>
            <small style="margin-top:8px;display:block;">Check your email for the accept link</small>
          `;
        } else {
          throw new Error('Failed to send email');
        }
      } catch (e) {
        status.className = 'status error';
        status.textContent = '❌ Error: ' + e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate & Send Test Quote';
      }
    }
  </script>
</body>
</html>
