}

async function loadSurveyors() {
  try {
    const surveyors = await dbGet('surveyors', {
      'select': 'id,full_name,email,phone,hourly_rate,home_postcode,radius_miles,pi_expiry_date,pl_expiry_date,dbs_expiry_date,is_active,status,created_at',
      'order': 'full_name.asc'
    });

    // Load all invoiced jobs for current year to calculate earnings
    const currentYear = new Date().getFullYear();
    const startOfYear = `${currentYear}-01-01`;
    const endOfYear = `${currentYear}-12-31`;

    const jobs = await dbGet('jobs', {
      'select': 'id,assigned_surveyor_id,agreed_amount,invoiced,invoiced_at',
      'invoiced': `eq.true`,
      'invoiced_at': `gte.${startOfYear}`,
    });

    // Calculate earnings per surveyor
    const earningsBysSurveyor = {};
    (jobs || []).forEach(job => {
      if (job.assigned_surveyor_id) {
        if (!earningsBysSurveyor[job.assigned_surveyor_id]) {
          earningsBysSurveyor[job.assigned_surveyor_id] = { jobs: 0, total: 0 };
        }
        earningsBysSurveyor[job.assigned_surveyor_id].jobs += 1;
        earningsBysSurveyor[job.assigned_surveyor_id].total += Number(job.agreed_amount) || 0;
      }
    });

    // Attach earnings to each surveyor
    allSurveyors = (surveyors || []).map(s => ({
      ...s,
      earnings: earningsBysSurveyor[s.id] || { jobs: 0, total: 0 }
    }));

    renderTable();
  } catch (e) {
    document.getElementById('surveyorsTable').innerHTML = `<div class="empty-state"><p>Error: ${e.message}</p></div>`;
  }
}

// Traffic-light status for an expiry date
function expiryStatus(dateStr) {
  if (!dateStr) return { cls: 'badge-low', label: '— Not set' };
  const days = Math.floor((new Date(dateStr) - Date.now()) / (1000 * 60 * 60 * 24));
  if (days < 0)    return { cls: 'badge-urgent',   label: '🔴 Expired' };
  if (days <= 30)  return { cls: 'badge-elevated', label: '🟠 ' + days + 'd left' };
  return { cls: 'badge-accepted', label: '🟢 Valid' };
}

function worstInsuranceStatus(s) {
  const pi = expiryStatus(s.pi_expiry_date);
  const pl = expiryStatus(s.pl_expiry_date);
  const rank = s => s.cls === 'badge-urgent' ? 0 : s.cls === 'badge-elevated' ? 1 : s.cls === 'badge-accepted' ? 2 : 3;
  return rank(pi) <= rank(pl) ? pi : pl;
}

async function getAreaFromPostcode(postcode) {
  if (!postcode) return null;

  try {
    const url = `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(postcode)}&components=country:UK&key=${GOOGLE_MAPS_KEY}`;
    const response = await fetch(url);
    const data = await response.json();

    if (data.status !== 'OK' || !data.results.length) return null;

    const result = data.results[0];
    for (const component of result.address_components) {
      if (component.types.includes('administrative_area_level_2')) {
        return component.long_name;
      }
      if (component.types.includes('administrative_area_level_1')) {
        return component.long_name;
      }
    }
    return null;
  } catch (error) {
    console.error('Geocoding error:', error);
    return null;
  }
}

async function renderTable() {
  let filtered = [...allSurveyors];

  if (activeFilter === 'pending')  filtered = filtered.filter(s => s.status === 'pending');
  if (activeFilter === 'active')   filtered = filtered.filter(s => s.status === 'active');
  if (activeFilter === 'paused')   filtered = filtered.filter(s => s.status === 'paused');
  if (activeFilter === 'expiring') filtered = filtered.filter(s =>
    expiryStatus(s.pi_expiry_date).cls === 'badge-elevated' ||
    expiryStatus(s.pl_expiry_date).cls === 'badge-elevated'
  );
  if (activeFilter === 'expired') filtered = filtered.filter(s =>
    expiryStatus(s.pi_expiry_date).cls === 'badge-urgent' ||
    expiryStatus(s.pl_expiry_date).cls === 'badge-urgent'
  );

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(s =>
      (s.full_name || '').toLowerCase().includes(q) ||
      (s.email     || '').toLowerCase().includes(q)
    );
  }

  document.getElementById('surveyorCount').textContent = `${filtered.length} surveyor${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    document.getElementById('surveyorsTable').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <h3>No surveyors yet</h3>
        <p>Add a surveyor using the button in the top-right</p>
      </div>`;
    return;
  }

  const rows = await Promise.all(filtered.map(async s => {
    const pi  = expiryStatus(s.pi_expiry_date);
    const pl  = expiryStatus(s.pl_expiry_date);
    const dbs = expiryStatus(s.dbs_expiry_date);
    let statusBadge;
    if (s.status === 'pending') {
      statusBadge = `<span class="badge badge-elevated">⏳ Pending</span>`;
    } else if (s.status === 'active') {
      statusBadge = `<span class="badge badge-accepted">✅ Active</span>`;
    } else {
      statusBadge = `<span class="badge badge-low">⏸ Paused</span>`;
    }
    const area = await getAreaFromPostcodeAPI(s.home_postcode);
    const postcodeDisplay = s.home_postcode ? `${s.home_postcode}<br><span style="font-size:12px;color:#666;">${area || '—'}</span>` : '—';
    return `
    <tr onclick="window.location.href='surveyor-detail.html?id=${s.id}'" style="cursor:pointer">
      <td>
        <div style="font-weight:600;font-size:14px;">${s.full_name || '—'}</div>
        <div class="muted">${s.email || ''}</div>
      </td>
      <td>${postcodeDisplay}</td>
      <td>${s.hourly_rate ? '£' + Number(s.hourly_rate).toFixed(2) + '/hr' : '—'}</td>
      <td>${s.radius_miles ? s.radius_miles + ' miles' : '—'}</td>
      <td><span class="badge ${pi.cls}">${pi.label}</span></td>
      <td><span class="badge ${pl.cls}">${pl.label}</span></td>
      <td><span class="badge ${dbs.cls}">${dbs.label}</span></td>
      <td style="font-weight:600;color:var(--green-mid);">${s.earnings.jobs} jobs</td>
      <td style="font-weight:600;font-size:15px;color:var(--green-dark);">£${Number(s.earnings.total).toLocaleString()}</td>
      <td>${statusBadge}</td>
    </tr>`;
  }));

  document.getElementById('surveyorsTable').innerHTML = `
    <table class="data-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Postcode</th>
          <th>Rate</th>

          <th>PL Insurance</th>
          <th>DBS</th>

      </thead>
      <tbody>${rows.join('')}</tbody>
    </table>`;
}

async function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  await renderTable();
}

async function handleSearch(q) {
  searchQuery = q;
  await renderTable();
}
