<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THAC CRM — Jobs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/thac.css">
</head>
<body>
<div class="app-layout" id="app"></div>

<script src="js/supabase.js"></script>
<script src="js/thac.js"></script>
<script>
requireAuth();

let allJobs = [];
let activeFilter = 'all';
let searchQuery = '';

async function init() {
  document.getElementById('app').innerHTML = `
    ${renderSidebar('jobs')}
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-title">Jobs</div>
        <div class="topbar-search">
          <span>🔍</span>
          <input type="text" placeholder="Search by ref, postcode..." oninput="handleSearch(this.value)">
        </div>
      </div>
      <div class="page-body">
        <div class="card">
          <div class="card-title">
            All Jobs
            <span style="font-size:13px;font-weight:400;color:var(--text-muted)" id="jobCount"></span>
          </div>
          <div class="filter-bar">
            <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
            <button class="filter-btn" onclick="setFilter('pending_approval', this)">⏳ Pending</button>
            <button class="filter-btn" onclick="setFilter('red', this)">🔴 Unallocated</button>
            <button class="filter-btn" onclick="setFilter('orange', this)">🟠 Claimed</button>
            <button class="filter-btn" onclick="setFilter('yellow', this)">🟡 Attended</button>
            <button class="filter-btn" onclick="setFilter('green', this)">🟢 Report Sent</button>
            <button class="filter-btn" onclick="setFilter('archived', this)">📦 Archived</button>
          </div>
          <div id="jobsTable"><div class="loading"><div class="spinner"></div><br>Loading jobs...</div></div>
        </div>
      </div>
    </div>
  `;

  await loadJobs();
  await loadEnquiryBadge();
}

async function loadJobs() {
  try {
    const data = await dbGet('jobs', {
      'select': 'id,reference,job_type,survey_type,urgency_state,dispatch_state,site_postcode,survey_date,agreed_amount,billing_mode,is_archived,created_at',
      'order': 'created_at.desc',
      'limit': 100
    });

    allJobs = data || [];
    renderTable();
  } catch (e) {
    document.getElementById('jobsTable').innerHTML = `<div class="empty-state"><p>Error: ${e.message}</p></div>`;
  }
}

function getDispatchLabel(state) {
  switch(state) {
    case 'pending_approval': return { label: '⏳ Pending Approval', class: 'badge-low' };
    case 'red':    return { label: '🔴 Unallocated', class: 'badge-urgent' };
    case 'orange': return { label: '🟠 Claimed',     class: 'badge-elevated' };
    case 'yellow': return { label: '🟡 Attended',    class: 'badge-standard' };
    case 'green':  return { label: '🟢 Report Sent', class: 'badge-accepted' };
    case 'archived': return { label: '📦 Archived',  class: 'badge-low' };
    default:       return { label: state || '—',     class: 'badge-low' };
  }
}

function getUrgencyLabel(state) {
  switch(state) {
    case 'red':    return { label: '🔴 Urgent',   class: 'badge-urgent' };
    case 'orange': return { label: '🟠 Elevated', class: 'badge-elevated' };
    case 'yellow': return { label: '🟡 Standard', class: 'badge-standard' };
    case 'grey':   return { label: '⚫ Low',      class: 'badge-low' };
    case 'green':  return { label: '🟢 Complete', class: 'badge-accepted' };
    default:       return { label: state || '—',  class: 'badge-low' };
  }
}

function renderTable() {
  let filtered = allJobs;

  if (activeFilter !== 'all') {
    if (activeFilter === 'archived') {
      filtered = filtered.filter(j => j.dispatch_state === 'archived');
    } else {
      filtered = filtered.filter(j => j.dispatch_state === activeFilter);
    }
  } else {
    filtered = filtered.filter(j => !j.is_archived);
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(j =>
      (j.reference || '').toLowerCase().includes(q) ||
      (j.site_postcode || '').toLowerCase().includes(q)
    );
  }

  document.getElementById('jobCount').textContent = `${filtered.length} record${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    document.getElementById('jobsTable').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">💼</div>
        <h3>No jobs found</h3>
        <p>Jobs will appear here once enquiries are approved</p>
      </div>`;
    return;
  }

  const rows = filtered.map(j => {
    const dispatch = getDispatchLabel(j.dispatch_state);
    const urgency = getUrgencyLabel(j.urgency_state);
    return `
    <tr onclick="window.location.href='job-detail.html?id=${j.id}'" style="cursor:pointer">
      <td><div class="ref">${j.reference || j.id.slice(0,8).toUpperCase()}</div></td>
      <td>${getSurveyLabel(j.survey_type || j.job_type)}</td>
      <td>${j.site_postcode || '—'}</td>
      <td>${j.survey_date ? formatDate(j.survey_date) : '<span class="muted">TBC</span>'}</td>
      <td><span class="badge ${urgency.class}">${urgency.label}</span></td>
      <td><span class="badge ${dispatch.class}">${dispatch.label}</span></td>
      <td>${j.agreed_amount ? '£' + Number(j.agreed_amount).toLocaleString() : '<span class="muted">—</span>'}</td>
    </tr>`;
  }).join('');

  document.getElementById('jobsTable').innerHTML = `
    <table class="data-table">
      <thead>
        <tr>
          <th>Reference</th>
          <th>Survey Type</th>
          <th>Postcode</th>
          <th>Survey Date</th>
          <th>Urgency</th>
          <th>Dispatch</th>
          <th>Value</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function handleSearch(q) {
  searchQuery = q;
  renderTable();
}

init();
</script>
</body>
</html>
