<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THAC CRM — Resource Library</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/thac.css">
</head>
<body>
<div id="app"></div>
<script src="js/supabase.js"></script>
<script src="js/thac.js"></script>
<script>
requireAuth();

const CATEGORIES = {
  survey_instructions: { label: 'Survey Instructions', emoji: '📋' },
  report_templates:    { label: 'Report Templates',    emoji: '📄' },
  standard_terms:      { label: 'Standard Terms',      emoji: '📜' },
  training:            { label: 'Training Materials',  emoji: '🎓' },
  other:               { label: 'Other',               emoji: '📁' },
};

let allResources = [];
let editingId    = null;

async function init() {
  document.getElementById('app').innerHTML = `
    ${renderSidebar('resources')}
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-title">Resource Library</div>
        <button class="btn btn-primary btn-sm" onclick="openAddForm()">+ Add Resource</button>
      </div>
      <div class="page-body">
        <div id="addFormWrap" style="display:none;margin-bottom:20px;"></div>
        <div id="resourcesBody"><div class="loading"><div class="spinner"></div><br>Loading resources…</div></div>
      </div>
    </div>
  `;
  await load();
}

async function load() {
  const data = await dbGet('resources', { 'order': 'category.asc,sort_order.asc,title.asc' });
  allResources = data || [];
  render();
}

function render() {
  const body = document.getElementById('resourcesBody');
  if (!allResources.length) {
    body.innerHTML = `<div class="empty-state"><h3>No resources yet</h3><p>Click "+ Add Resource" to add the first one.</p></div>`;
    return;
  }

  // Group by category
  const groups = {};
  allResources.forEach(r => {
    if (!groups[r.category]) groups[r.category] = [];
    groups[r.category].push(r);
  });

  const html = Object.entries(groups).map(([cat, items]) => {
    const { label, emoji } = CATEGORIES[cat] || { label: cat, emoji: '📁' };
    const rows = items.map(r => `
      <div class="card" style="margin-bottom:10px;${!r.is_active ? 'opacity:0.5;' : ''}">
        <div style="display:flex;align-items:flex-start;gap:12px;">
          <div style="font-size:28px;flex-shrink:0;">${emoji}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;font-size:15px;color:var(--green-dark);">${r.title}
              ${!r.is_active ? '<span style="font-size:11px;color:var(--text-muted);font-weight:400;margin-left:6px;">Inactive</span>' : ''}
            </div>
            ${r.description ? `<div style="font-size:13px;color:var(--text-muted);margin-top:2px;">${r.description}</div>` : ''}
            ${r.url ? `<a href="${r.url}" target="_blank" style="display:inline-flex;align-items:center;gap:4px;margin-top:6px;font-size:13px;color:var(--green-mid);font-weight:500;">
              Open document →
            </a>` : '<div style="font-size:12px;color:var(--text-muted);margin-top:6px;font-style:italic;">No link yet — edit to add</div>'}
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0;">
            <button class="btn btn-secondary btn-sm" onclick="openEditForm('${r.id}')">Edit</button>
            <button class="btn btn-secondary btn-sm" onclick="toggleActive('${r.id}', ${r.is_active})">
              ${r.is_active ? 'Deactivate' : 'Activate'}
            </button>
            <button class="btn btn-secondary btn-sm" style="color:#dc2626;" onclick="deleteResource('${r.id}', '${r.title.replace(/'/g, "\\'")}')">Delete</button>
          </div>
        </div>
      </div>`).join('');
    return `
      <div style="margin-bottom:28px;">
        <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:10px;">${emoji} ${label}</div>
        ${rows}
      </div>`;
  }).join('');

  body.innerHTML = html;
}

function resourceForm(r = {}) {
  return `
    <div class="card" style="border-left:3px solid var(--green-mid);">
      <div class="card-title">${r.id ? 'Edit Resource' : 'Add Resource'}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group" style="grid-column:1/-1;">
          <label>Title *</label>
          <input type="text" class="form-control" id="fTitle" value="${r.title || ''}" placeholder="e.g. BS5837 Survey Methodology Guide">
        </div>
        <div class="form-group">
          <label>Category</label>
          <select class="form-control" id="fCategory">
            ${Object.entries(CATEGORIES).map(([k, v]) => `<option value="${k}" ${r.category === k ? 'selected' : ''}>${v.label}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>Sort Order <span style="font-size:11px;color:var(--text-muted);">(lower = first)</span></label>
          <input type="number" class="form-control" id="fSort" value="${r.sort_order ?? 0}" min="0">
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label>Description</label>
          <input type="text" class="form-control" id="fDesc" value="${r.description || ''}" placeholder="Brief description of this document">
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label>Document URL <span style="font-size:11px;color:var(--text-muted);">(Google Drive sharing link)</span></label>
          <input type="url" class="form-control" id="fUrl" value="${r.url || ''}" placeholder="https://drive.google.com/...">
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn btn-secondary" onclick="closeForm()">Cancel</button>
        <button class="btn btn-primary" onclick="saveResource('${r.id || ''}')">
          ${r.id ? 'Save Changes' : 'Add Resource'}
        </button>
      </div>
    </div>`;
}

function openAddForm() {
  editingId = null;
  document.getElementById('addFormWrap').style.display = 'block';
  document.getElementById('addFormWrap').innerHTML = resourceForm();
  document.getElementById('addFormWrap').scrollIntoView({ behavior: 'smooth' });
  document.getElementById('fTitle').focus();
}

function openEditForm(id) {
  editingId = id;
  const r = allResources.find(x => x.id === id);
  if (!r) return;
  document.getElementById('addFormWrap').style.display = 'block';
  document.getElementById('addFormWrap').innerHTML = resourceForm(r);
  document.getElementById('addFormWrap').scrollIntoView({ behavior: 'smooth' });
}

function closeForm() {
  editingId = null;
  document.getElementById('addFormWrap').style.display = 'none';
  document.getElementById('addFormWrap').innerHTML = '';
}

async function saveResource(id) {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { showToast('Title is required', 'error'); return; }

  const payload = {
    title,
    category:    document.getElementById('fCategory').value,
    description: document.getElementById('fDesc').value.trim() || null,
    url:         document.getElementById('fUrl').value.trim()  || null,
    sort_order:  parseInt(document.getElementById('fSort').value) || 0,
  };

  try {
    if (id) {
      await dbUpdate('resources', `id=eq.${id}`, payload);
      showToast('Resource updated');
    } else {
      await dbInsert('resources', { ...payload, is_active: true });
      showToast('Resource added');
    }
    closeForm();
    await load();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function toggleActive(id, current) {
  try {
    await dbUpdate('resources', `id=eq.${id}`, { is_active: !current });
    showToast(current ? 'Resource deactivated' : 'Resource activated');
    await load();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function deleteResource(id, title) {
  if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
  try {
    await dbDelete('resources', `id=eq.${id}`);
    showToast('Resource deleted');
    await load();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

init();
</script>
</body>
</html>
