async function supabaseGet(table, query) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  return res.json();
}

async function supabasePatch(table, filter, data) {
  await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}`, {
    method: 'PATCH',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(data)
  });
}

const FIELD_STYLE = 'width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;font-family:inherit;box-sizing:border-box;';
const LABEL_STYLE = 'display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;';
const HINT_STYLE  = 'font-weight:400;color:#9ca3af;';
const SEC_STYLE   = 'font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#6b7280;border-top:1px solid #e5e7eb;padding-top:20px;margin:20px 0 14px;';

function field(id, label, hint, type='text', placeholder='', rows=0, extraStyle='') {
  const inp = rows
    ? `<textarea id="${id}" rows="${rows}" placeholder="${placeholder}" style="${FIELD_STYLE}resize:vertical;${extraStyle}"></textarea>`
    : `<input id="${id}" type="${type}" placeholder="${placeholder}" style="${FIELD_STYLE}${extraStyle}">`;
  return `
    <div style="margin-bottom:14px;">
      <label style="${LABEL_STYLE}">${label}${hint ? ` <span style="${HINT_STYLE}">${hint}</span>` : ''}</label>
      ${inp}
    </div>`;
}

async function submitStep2(enquiryId, ref) {
  const btn = document.querySelector('.btn-accept');

  // Validate T&C acceptance
  if (!document.getElementById('tcAccepted').checked) {
    alert('Please accept the terms and conditions to continue.');
    return;
  }

  btn.textContent = 'Saving…';
  btn.disabled = true;

  const endClientName  = document.getElementById('endClientName')?.value.trim()  || null;
  const endClientEmail = document.getElementById('endClientEmail')?.value.trim() || null;
  const billAddress    = document.getElementById('billAddress').value.trim()      || null;
  const reportName     = document.getElementById('reportName').value.trim()       || null;
  const reportAddress  = document.getElementById('reportAddress').value.trim()    || null;

  // Report addressee defaults to end client → billing if not provided
  const finalReportName    = reportName    || endClientName    || null;
  const finalReportAddress = reportAddress || billAddress      || null;

  try {
    const updateData = {
      status:                   'accepted',
      accepted_at:              new Date().toISOString(),
      billing_contact_name:     document.getElementById('billName').value.trim()  || null,
      billing_contact_email:    document.getElementById('billEmail').value.trim() || null,
      billing_address:          billAddress,
      end_client_name:          endClientName,
      end_client_email:         endClientEmail,
      report_addressee_name:    finalReportName,
      report_addressee_address: finalReportAddress,
      report_title:             document.getElementById('reportTitle').value.trim() || null,
      access_details:           document.getElementById('accessDetails').value.trim() || null,
      parking_details:          document.getElementById('parkingDetails').value.trim() || null,
      tc_accepted:              true,
      tc_accepted_at:           new Date().toISOString(),
      client_details_at:        new Date().toISOString(),
    };

    if (polygonCoordinates) {
      updateData.site_boundary_polygon = JSON.stringify(polygonCoordinates);
    }

    await supabasePatch('enquiries', `id=eq.${enquiryId}`, updateData);

    // Auto-create job from accepted quote
    try {
      const jobData = {
        enquiry_id: enquiryId,
        survey_type: currentEnquiry?.survey_type,
        site_postcode: currentEnquiry?.site_postcode,
        dispatch_state: 'pending_approval',
        urgency_state: currentEnquiry?.deadline_tier === '1day' ? 'red' :
                       currentEnquiry?.deadline_tier === '3days' ? 'orange' :
                       currentEnquiry?.deadline_tier === '5days' ? 'yellow' : 'grey',
        quoted_amount: currentEnquiry?.quoted_price,
        agreed_amount: currentEnquiry?.quoted_price,
        site_access_notes: document.getElementById('accessDetails').value.trim() || null,
        billing_contact_name: document.getElementById('billName').value.trim() || null,
        billing_contact_email: document.getElementById('billEmail').value.trim() || null,
        billing_address: billAddress,
        report_addressee_name: finalReportName,
        report_addressee_address: finalReportAddress,
        report_title: document.getElementById('reportTitle').value.trim() || null,
        site_boundary_polygon: polygonCoordinates ? JSON.stringify(polygonCoordinates) : null,
      };

      console.log('polygonCoordinates before job creation:', polygonCoordinates);
      console.log('Creating job with data:', jobData);

      const jobResp = await fetch(`${SUPABASE_URL}/rest/v1/jobs`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation'
        },
        body: JSON.stringify(jobData)
      });

      const jobRespText = await jobResp.text();
      console.log('Job response status:', jobResp.status);
      console.log('Job response:', jobRespText);

      if (!jobResp.ok) {
        console.error('❌ Job creation failed with status', jobResp.status);
        console.error('Error details:', jobRespText);
      } else {
        try {
          const createdJob = JSON.parse(jobRespText);
          console.log('✅ Job created successfully:', createdJob[0]?.id);
        } catch (e) {
          console.log('✅ Job created (could not parse response)');
        }
      }
    } catch (jobErr) {
      console.error('Error creating job:', jobErr.message);
    }

    showDone('🎉', 'All Done!',
      `Thank you — we have everything we need. Trevor will review and contact you shortly to confirm your survey date.`,
      { job_number: ref }
    );
  } catch (e) {
    btn.textContent = 'Submit Details →';
    btn.disabled = false;
    alert('Something went wrong — please try again or contact us directly.');
  }
}

async function declineQuote(enquiryId) {
  const btn = document.querySelector('.btn-decline');
  btn.textContent = 'Submitting…';
  btn.disabled = true;

  const selected = document.querySelector('input[name="declineReason"]:checked')?.value || '';
  const extra    = document.getElementById('declineOther')?.value.trim() || '';
  const reason   = [selected, extra].filter(Boolean).join(' — ') || null;

  try {
    await supabasePatch('enquiries', `id=eq.${enquiryId}`, {
      status:          'declined',
      declined_reason: reason,
      declined_at:     new Date().toISOString(),
    });
    document.getElementById('card').innerHTML = `
      <div class="logo">🌳</div>
      <div class="brand">Trevor Heaps Arboricultural Consultancy Ltd.</div>
      <div class="icon">👋</div>
      <h1>Quote Declined</h1>
      <p class="sub">No problem at all. Thank you for letting us know${reason ? ' — your feedback is appreciated' : ''}. If you change your mind or need help in the future, we're always happy to assist.</p>
      <div class="footer">Trevor Heaps Arboricultural Consultancy Ltd.</div>
    `;
  } catch (e) {
    btn.textContent = 'Confirm Decline';
    btn.disabled = false;
    alert('Something went wrong — please try again or contact us directly.');
  }
}

function updateAcceptanceTime() {
  const timeEl = document.getElementById('acceptTime');
  if (timeEl) {

                   ' at ' + now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    timeEl.textContent = format;
  }
}

function initializeMap() {
  setTimeout(() => {
    const container = document.getElementById('mapContainer');
    if (!container || map) return;

    const postcode = currentEnquiry?.postcode || 'UK';
    console.log('Initializing Leaflet map for postcode:', postcode);
    console.log('L available:', typeof L !== 'undefined');
    console.log('L.Control.Draw available:', typeof L !== 'undefined' && typeof L.Control.Draw !== 'undefined');

    try {
      // Initialize Leaflet map with OpenStreetMap
      map = L.map(container).setView([54, -2], 6);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
      }).addTo(map);
      console.log('Leaflet map created');

      // Geocode postcode to coordinates
      fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(postcode)}&addressdetails=1&limit=1`)
        .then(r => r.json())
        .then(results => {
          if (results.length > 0) {
            const loc = results[0];
            const lat = parseFloat(loc.lat);
            const lng = parseFloat(loc.lon);
            console.log('Geocoded to:', lat, lng);
            map.setView([lat, lng], 16);
          } else {
            console.warn('Postcode not found, staying at UK center');
          }

          // Add drawing tools
          if (typeof L.Control.Draw === 'undefined') {
            console.error('Leaflet-Draw not loaded');
            container.innerHTML += '<div style="padding:10px;margin-top:8px;font-size:12px;color:#dc2626;background:#fee2e2;border-radius:4px;">Drawing tools not available. Please refresh the page.</div>';
            return;
          }

          const drawnItems = new L.FeatureGroup();
          map.addLayer(drawnItems);
          console.log('Drawing feature group added');

          const drawControl = new L.Control.Draw({
            position: 'topleft',
            draw: {
              polygon: true,
              polyline: false,
              rectangle: false,
              circle: false,
              marker: false,
              circlemarker: false
            },
            edit: {
              featureGroup: drawnItems,
              remove: true
            }
          });
          map.addControl(drawControl);
          console.log('Draw control added to map');

          map.on(L.Draw.Event.CREATED, (e) => {
            console.log('Draw event triggered');
            const layer = e.layer;
            drawnItems.addLayer(layer);

            if (layer instanceof L.Polygon) {
              const latlngs = layer.getLatLngs()[0];
              polygonCoordinates = latlngs.map(point => ({
                lat: point.lat,
                lng: point.lng
              }));
              console.log('Polygon drawn with', polygonCoordinates.length, 'points');
            }
          });

          console.log('✅ Leaflet map ready with drawing tools');
        })
        .catch(err => {
          console.error('Geocoding error:', err);
          console.log('Map ready with default view');
        });

    } catch (err) {
      console.error('Leaflet initialization error:', err);
      container.innerHTML += '<div style="padding:10px;margin-top:8px;font-size:12px;color:#dc2626;background:#fee2e2;border-radius:4px;">Error: ' + err.message + '</div>';
    }

    updateAcceptanceTime();
    setInterval(updateAcceptanceTime, 60000);
  }, 100);
}

function updateAcceptanceTime() {
  const now = new Date();
  const formatted = now.toLocaleString('en-GB', {
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
  const elem = document.getElementById('acceptTime');
  if (elem) elem.textContent = formatted;
}

// Initialize timestamp and update every second while form is displayed
document.addEventListener('DOMContentLoaded', () => {
  updateAcceptanceTime();
  setInterval(updateAcceptanceTime, 1000);
});

init();
</script>
