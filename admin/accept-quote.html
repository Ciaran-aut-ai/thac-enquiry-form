async function supabaseGet(table, query) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  return res.json();
}

async function supabasePatch(table, filter, data) {
  await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}`, {
    method: 'PATCH',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(data)
  });
}

async function init() {

    showError('Invalid link — no enquiry reference found.');
    return;

  try {
    const data = await supabaseGet('enquiries',
      `id=eq.${id}&select=id,job_number,contact_name,survey_type,site_postcode,deadline_tier,quoted_price,status&limit=1`

    if (!data || !data.length) {
      showError('Quote not found. Please contact us directly.');
      return;

    // Already actioned

    }

}

    <div style="margin-bottom:14px;">
      <label style="${LABEL_STYLE}">${label}${hint ? ` <span style="${HINT_STYLE}">${hint}</span>` : ''}</label>
      ${inp}

}

async function submitStep2(enquiryId, ref) {
  console.log('🚀 submitStep2 called with enquiryId:', enquiryId, 'ref:', ref);
  const btn = document.querySelector('.btn-accept');

  // Validate T&C acceptance
  if (!document.getElementById('tcAccepted').checked) {
    alert('Please accept the terms and conditions to continue.');
    return;
  }

  btn.textContent = 'Saving…';
  btn.disabled = true;

  const endClientName  = document.getElementById('endClientName')?.value.trim()  || null;
  const endClientEmail = document.getElementById('endClientEmail')?.value.trim() || null;
  const billAddress    = document.getElementById('billAddress').value.trim()      || null;
  const reportName     = document.getElementById('reportName').value.trim()       || null;
  const reportAddress  = document.getElementById('reportAddress').value.trim()    || null;

  // Report addressee defaults to end client → billing if not provided
  const finalReportName    = reportName    || endClientName    || null;
  const finalReportAddress = reportAddress || billAddress      || null;

  try {
    const updateData = {
      status:                   'accepted',
      accepted_at:              new Date().toISOString(),
      billing_contact_name:     document.getElementById('billName').value.trim()  || null,
      billing_contact_email:    document.getElementById('billEmail').value.trim() || null,
      billing_address:          billAddress,
      end_client_name:          endClientName,
      end_client_email:         endClientEmail,
      report_addressee_name:    finalReportName,
      report_addressee_address: finalReportAddress,
      report_title:             document.getElementById('reportTitle').value.trim() || null,
      access_details:           document.getElementById('accessDetails').value.trim() || null,
      parking_details:          document.getElementById('parkingDetails').value.trim() || null,
      tc_accepted:              true,
      tc_accepted_at:           new Date().toISOString(),
      client_details_at:        new Date().toISOString(),
    };

    if (parkingLat !== null && parkingLng !== null) {
      updateData.parking_lat = parkingLat;
      updateData.parking_lng = parkingLng;
      console.log('✅ Parking data added to update:', parkingLat, parkingLng);
    } else {
      console.log('⚠️ No parking location - parkingLat:', parkingLat, 'parkingLng:', parkingLng);
    }

    console.log('📤 Sending PATCH to enquiries with data:', updateData);
    await supabasePatch('enquiries', `id=eq.${enquiryId}`, updateData);
    console.log('✅ Enquiries PATCH completed');

    // Update the job that was created at enquiry submission time
    try {
      const jobResp = await fetch(`${SUPABASE_URL}/rest/v1/jobs?enquiry_id=eq.${enquiryId}&select=id&limit=1`, {
        method: 'GET',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });

      if (jobResp.ok) {
        const jobs = await jobResp.json();
        if (jobs && jobs.length > 0) {
          const jobId = jobs[0].id;
          const jobUpdateData = {
            site_access_notes: document.getElementById('accessDetails').value.trim() || null,
            billing_contact_name: document.getElementById('billName').value.trim() || null,
            billing_contact_email: document.getElementById('billEmail').value.trim() || null,
            billing_address: billAddress,
            report_addressee_name: finalReportName,
            report_addressee_address: finalReportAddress,
            report_title: document.getElementById('reportTitle').value.trim() || null,
            parking_lat: parkingLat,
            parking_lng: parkingLng,
            extended_info_received: true,
            extended_info_received_at: new Date().toISOString(),
          };

          console.log('📤 Updating job', jobId, 'with parking_lat:', jobUpdateData.parking_lat, 'parking_lng:', jobUpdateData.parking_lng);

          const updateJobResp = await fetch(`${SUPABASE_URL}/rest/v1/jobs?id=eq.${jobId}`, {
            method: 'PATCH',
            headers: {
              'apikey': SUPABASE_KEY,
              'Content-Type': 'application/json',
              'Prefer': 'return=minimal'
            },
            body: JSON.stringify(jobUpdateData)
          });

          if (updateJobResp.ok) {
            console.log('✅ Job updated successfully');
          } else {
            console.error('❌ Job update failed:', updateJobResp.status);
          }
        } else {
          console.log('⚠️ No job found for enquiry, falling back to create');
          // Defensive fallback: create job if not found
          const jobData = {
            enquiry_id: enquiryId,
            survey_type: currentEnquiry?.survey_type,
            site_postcode: currentEnquiry?.site_postcode,
            dispatch_state: 'pending_approval',
            urgency_state: currentEnquiry?.deadline_tier === '1day' ? 'red' :
                           currentEnquiry?.deadline_tier === '3days' ? 'orange' :
                           currentEnquiry?.deadline_tier === '5days' ? 'yellow' : 'grey',
            quoted_amount: currentEnquiry?.quoted_price,
            agreed_amount: currentEnquiry?.quoted_price,
            site_access_notes: document.getElementById('accessDetails').value.trim() || null,
            billing_contact_name: document.getElementById('billName').value.trim() || null,
            billing_contact_email: document.getElementById('billEmail').value.trim() || null,
            billing_address: billAddress,
            report_addressee_name: finalReportName,
            report_addressee_address: finalReportAddress,
            report_title: document.getElementById('reportTitle').value.trim() || null,
            parking_lat: parkingLat,
            parking_lng: parkingLng,
          };

          const createJobResp = await fetch(`${SUPABASE_URL}/rest/v1/jobs`, {
            method: 'POST',
            headers: {
              'apikey': SUPABASE_KEY,
              'Content-Type': 'application/json',
              'Prefer': 'return=representation'
            },
            body: JSON.stringify(jobData)
          });

          if (createJobResp.ok) {
            console.log('✅ Job created as fallback');
          }
        }
      }
    } catch (jobErr) {
      console.error('Error updating/creating job:', jobErr.message);
    }

    showDone('🎉', 'All Done!',
      `Thank you — we have everything we need. Trevor will review and contact you shortly to confirm your survey date.`,
      { job_number: ref }
    );
  } catch (e) {
    btn.textContent = 'Submit Details →';
    btn.disabled = false;
    alert('Something went wrong — please try again or contact us directly.');
  }
}

async function declineQuote(enquiryId) {
  const btn = document.querySelector('.btn-decline');
  btn.textContent = 'Submitting…';
  btn.disabled = true;

  const selected = document.querySelector('input[name="declineReason"]:checked')?.value || '';
  const extra    = document.getElementById('declineOther')?.value.trim() || '';
  const reason   = [selected, extra].filter(Boolean).join(' — ') || null;

  try {
    await supabasePatch('enquiries', `id=eq.${enquiryId}`, {
      status:          'declined',
      declined_reason: reason,
      declined_at:     new Date().toISOString(),
    });

    // Archive the linked job
    try {
      const jobResp = await fetch(`${SUPABASE_URL}/rest/v1/jobs?enquiry_id=eq.${enquiryId}&select=id&limit=1`, {
        method: 'GET',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });

      if (jobResp.ok) {
        const jobs = await jobResp.json();
        if (jobs && jobs.length > 0) {
          const jobId = jobs[0].id;
          await supabasePatch('jobs', `id=eq.${jobId}`, {
            dispatch_state: 'archived'
          });
          console.log('✅ Linked job archived');
        }
      }
    } catch (jobErr) {
      console.error('Error archiving job:', jobErr.message);
    }

    document.getElementById('card').innerHTML = `
      <div class="logo">🌳</div>
      <div class="brand">Trevor Heaps Arboricultural Consultancy Ltd.</div>
      <div class="icon">👋</div>
      <h1>Quote Declined</h1>
      <p class="sub">No problem at all. Thank you for letting us know${reason ? ' — your feedback is appreciated' : ''}. If you change your mind or need help in the future, we're always happy to assist.</p>
      <div class="footer">Trevor Heaps Arboricultural Consultancy Ltd.</div>
    `;
  } catch (e) {
    btn.textContent = 'Confirm Decline';
    btn.disabled = false;
    alert('Something went wrong — please try again or contact us directly.');
  }
}

function updateAcceptanceTime() {

    const now = new Date();
    const format = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) +
                   ' at ' + now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

  }
}

function initializeMap() {
  const container = document.getElementById('mapContainer');
  if (!container || map) return;

  // Ensure container has proper dimensions
  container.style.width = '100%';
  container.style.height = '400px';

  // Use site coordinates if available, otherwise UK default
  let initialLat = 54, initialLng = -2, initialZoom = 6;
  if (currentEnquiry?.site_lat && currentEnquiry?.site_lng) {
    initialLat = currentEnquiry.site_lat;
    initialLng = currentEnquiry.site_lng;
    initialZoom = 17;
  }

  // Initialize Leaflet map
  map = L.map(container).setView([initialLat, initialLng], initialZoom);

  // Add Esri World Imagery (satellite)
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Esri',
    maxZoom: 22
  }).addTo(map);

  // Add marker at site location if available
  if (currentEnquiry?.site_lat && currentEnquiry?.site_lng) {
    L.marker([currentEnquiry.site_lat, currentEnquiry.site_lng], {
      title: currentEnquiry.site_postcode || 'Survey Site'
    }).addTo(map);
  }

  // Parking pin drop handler
  let parkingMarker = null;
  console.log('Map initialized, attaching click handler');
  map.on('click', (e) => {
    console.log('Map clicked at:', e.latlng.lat, e.latlng.lng);
    parkingLat = e.latlng.lat;
    parkingLng = e.latlng.lng;
    if (parkingMarker) {
      parkingMarker.setLatLng(e.latlng);
    } else {
      parkingMarker = L.marker(e.latlng, { draggable: true }).addTo(map);
      parkingMarker.on('dragend', () => {
        const pos = parkingMarker.getLatLng();
        parkingLat = pos.lat;
        parkingLng = pos.lng;
        console.log('Marker dragged to:', parkingLat, parkingLng);
      });
    }
    console.log('Parking location set to:', parkingLat, parkingLng);
  });

  // Address search functionality
  const addressSearch = document.getElementById('addressSearch');
  if (addressSearch) {
    addressSearch.addEventListener('keypress', async (e) => {
      if (e.key !== 'Enter') return;

      const query = addressSearch.value.trim();
      if (!query) return;

      try {
        const response = await fetch(
          `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`
        );
        const results = await response.json();

        if (results.length > 0) {
          const { lat, lon, display_name } = results[0];
          map.setView([parseFloat(lat), parseFloat(lon)], 17);
          addressSearch.value = display_name;
        } else {
          alert('Address not found. Please try a different search.');
        }
      } catch (error) {
        console.error('Geocoding error:', error);
        alert('Could not search address. Please try again.');
      }
    });
  }
}

function updateAcceptanceTime() {
  const now = new Date();
  const formatted = now.toLocaleString('en-GB', {
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
  const elem = document.getElementById('acceptTime');
  if (elem) elem.textContent = formatted;
}

// Initialize timestamp and update every second while form is displayed
document.addEventListener('DOMContentLoaded', () => {
  updateAcceptanceTime();
  setInterval(updateAcceptanceTime, 1000);
});

init();
