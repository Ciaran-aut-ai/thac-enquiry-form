<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THAC CRM — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/thac.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-circle">🌳</div>
      <h1>THAC CRM</h1>
      <p>Trevor Heaps Arboricultural Consultancy</p>
    </div>

    <div class="login-error" id="loginError"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" class="form-control" id="email" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" class="form-control" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn btn-primary w-100" id="loginBtn" onclick="handleLogin()" style="justify-content:center; padding:12px;">
      Sign In
    </button>

    <p style="text-align:center; margin-top:20px; font-size:12px; color:var(--text-muted);">
      THAC internal system — authorised users only
    </p>
  </div>
</div>

<script src="js/supabase.js"></script>
<script>
  // Redirect if already logged in
  if (isLoggedIn()) window.location.href = 'dashboard.html';

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const errorEl = document.getElementById('loginError');

    errorEl.style.display = 'none';

    if (!email || !password) {
      errorEl.textContent = 'Please enter your email and password.';
      errorEl.style.display = 'block';
      return;
    }

    btn.textContent = 'Signing in...';
    btn.disabled = true;

    try {
      await login(email, password);
      window.location.href = 'dashboard.html';
    } catch (err) {
      errorEl.textContent = 'Incorrect email or password. Please try again.';
      errorEl.style.display = 'block';
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
