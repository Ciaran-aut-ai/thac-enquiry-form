<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amend Quote - Heaps Arboriculture</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f7faf8;
    }

    .header {
      background: #f5ede4;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #e0d5c7;
    }

    .header h1 {
      color: #1a3c2e;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .header p {
      color: #666;
      font-size: 16px;
    }

    .page-container {
      position: relative;
      min-height: 100vh;
      background-image: url('forest-canopy-light.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      overflow: hidden;
    }

    .page-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.25);
      z-index: 1;
    }

    .content-box {
      position: relative;
      z-index: 2;
      background: rgba(245, 237, 228, 0.96);
      border-radius: 16px;
      padding: 48px;
      max-width: 600px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.4);
    }

    .content-box h2 {
      color: #1a3c2e;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .content-box p {
      color: #374151;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .info-banner {
      background: rgba(26, 60, 46, 0.08);
      border-left: 4px solid #1a3c2e;
      padding: 16px;
      border-radius: 6px;
      margin-bottom: 24px;
    }

    .info-banner p {
      font-size: 14px;
      color: #1a3c2e;
      margin-bottom: 0;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: #1a3c2e;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #374151;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 120px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .button {
      width: 100%;
      padding: 14px;
      background: #1a3c2e;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 8px;
    }

    .button:hover {
      opacity: 0.9;
    }

    @media (max-width: 768px) {
      .page-container {
        padding: 40px 20px;
      }

      .content-box {
        max-width: 100%;
        padding: 32px;
      }

      .content-box h2 {
        font-size: 24px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>📋 Amend Your Quote</h1>
  <p>Refine details and update requirements</p>
</div>

<div class="page-container">
  <div class="content-box">
    <h2>Review & Adjust</h2>
    <p>Let us know what changes you'd like to make to your quote. We'll review your amendments and provide an updated quotation.</p>

    <div class="info-banner">
      <p><strong>Reference:</strong> Quote #2026-0142 | <strong>Date:</strong> 10 Jun 2026</p>
    </div>

    <form>
      <div class="form-row">
        <div class="form-group">
          <label>Your Name *</label>
          <input type="text" required placeholder="John Smith">
        </div>
        <div class="form-group">
          <label>Email Address *</label>
          <input type="email" required placeholder="john@example.com">
        </div>
      </div>

      <div class="form-group">
        <label>What would you like to change? *</label>
        <textarea required placeholder="E.g., additional trees, different scope, timeline changes..."></textarea>
      </div>

      <div class="form-group">
        <label>Any additional information?</label>
        <textarea placeholder="Additional details or questions..."></textarea>
      </div>

      <button type="submit" class="button">Submit Amendments →</button>
    </form>
  </div>
</div>

</body>
</html>
